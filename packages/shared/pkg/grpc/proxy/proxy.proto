syntax = "proto3";

package proxy;

option go_package = "github.com/e2b-dev/infra/packages/shared/pkg/grpc/proxy;proxygrpc";

// Request to resume a paused sandbox.
message SandboxResumeRequest {
  // Sandbox ID to resume.
  string sandbox_id = 1;
  reserved 2;
  reserved "timeout_seconds";
}

// Response with routing info for the resumed/running sandbox.
message SandboxResumeResponse {
  // Orchestrator node IP that can receive traffic for this sandbox.
  string orchestrator_ip = 1;
}

// Request to refresh the timeout of a running sandbox.
message SandboxKeepAliveRequest {
  // Sandbox ID to keep alive.
  string sandbox_id = 1;
  // Team ID owning the sandbox, sourced from the internal routing catalog.
  string team_id = 2;
}

message SandboxKeepAliveResponse {}

// SandboxService is used by the client-proxy to resume or keep alive sandboxes.
service SandboxService {
  rpc ResumeSandbox(SandboxResumeRequest) returns (SandboxResumeResponse);
  rpc KeepAliveSandbox(SandboxKeepAliveRequest) returns (SandboxKeepAliveResponse);
}
