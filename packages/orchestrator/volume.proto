syntax = "proto3";

import "google/protobuf/timestamp.proto";

option go_package = "https://github.com/e2b-dev/infra/orchestrator";

message VolumeInfo {
  string volume_id = 1;
  string volume_type = 2;
  string team_id = 3;
}

message EntryInfo {
  string name = 1;
  FileType type = 2;
  string path = 3;
  int64 size = 4;
  uint32 mode = 5;
  uint32 uid = 6;
  uint32 gid = 7;
  google.protobuf.Timestamp modified_time = 8;
  // If the entry is a symlink, this field contains the target of the symlink.
  optional string symlink_target = 9;
  google.protobuf.Timestamp created_time = 10;
  google.protobuf.Timestamp accessed_time = 11;
}

message UnknownVolumeTypeError {
  string volume_type = 1;
}

enum UserErrorCode {
  UNKNOWN_USER_ERROR_CODE = 0;
  PATH_NOT_FOUND = 1;
  PATH_ALREADY_EXISTS = 2;
  CANNOT_DELETE_ROOT = 3;
  NOT_SUPPORTED = 4;
  DEPTH_OUT_OF_RANGE = 5;
  INVALID_REQUEST = 6;
}

message UserError {
  UserErrorCode code = 1;
  string message = 2;
  uint32 http_status = 3;
}

message CreateVolumeRequest {
  VolumeInfo volume = 1;
}

message CreateVolumeResponse {
}

message DeleteVolumeRequest {
  VolumeInfo volume = 1;
}

message DeleteVolumeResponse {}

message VolumeDirectoryItem {
  EntryInfo entry = 1;
}

message ListDirRequest {
  VolumeInfo volume = 1;
  string path = 2;
  uint32 depth = 3;
}

message ListDirResponse {
  repeated VolumeDirectoryItem files = 1;
}

message CreateDirRequest {
  VolumeInfo volume = 1;
  string path = 2;
  optional uint32 mode = 3;
  optional uint32 uid = 4;
  optional uint32 gid = 5;
  bool create_parents = 6;
}

message CreateDirResponse {
  EntryInfo entry = 1;
}

message DeletePathRequest {
  VolumeInfo volume = 1;
  string path = 2;
}

message DeletePathResponse {}

message GetFileRequest {
  VolumeInfo volume = 1;
  string path = 2;
}

message VolumeFileGetResponseStart {
  int64 size = 1;
}

message VolumeFileGetResponseContent {
  bytes content = 1;
}

message VolumeFileGetResponseFinish {}

message GetFileResponse {
  oneof message {
    VolumeFileGetResponseStart start = 1;
    VolumeFileGetResponseContent content = 2;
    VolumeFileGetResponseFinish finish = 3;
  }
}

message VolumeFileCreateStart {
  VolumeInfo volume = 1;
  string path = 2;
  optional uint32 mode = 3;
  optional uint32 uid = 4;
  optional uint32 gid = 5;
  bool force = 6;
}

message VolumeFileCreateContent {
  bytes content = 1;
}

message VolumeFileCreateFinish {
}

message CreateFileRequest {
  oneof message {
    VolumeFileCreateStart start = 1;
    VolumeFileCreateContent content = 2;
    VolumeFileCreateFinish finish = 3;
  }
}

message CreateFileResponse {
  EntryInfo entry = 1;
}

message StatPathRequest {
  VolumeInfo volume = 1;
  string path = 2;
  bool follow_symlinks = 3;
}

message StatPathResponse {
  EntryInfo entry = 1;
}

enum FileType {
  FILE_TYPE_UNSPECIFIED = 0;
  FILE_TYPE_FILE = 1;
  FILE_TYPE_DIRECTORY = 2;
  FILE_TYPE_SYMLINK = 3;
}

message UpdatePathRequest {
  VolumeInfo volume = 1;
  string path = 2;
  optional uint32 mode = 3;
  optional uint32 uid = 4;
  optional uint32 gid = 5;
}

message UpdatePathResponse {
  EntryInfo entry = 1;
}

service VolumeService {
  // volume operations
  rpc CreateVolume(CreateVolumeRequest) returns (CreateVolumeResponse);
  rpc DeleteVolume(DeleteVolumeRequest) returns (DeleteVolumeResponse);

  // directory operations
  rpc CreateDir(CreateDirRequest) returns (CreateDirResponse);
  rpc ListDir(ListDirRequest) returns (ListDirResponse);

  // file operations
  rpc CreateFile(stream CreateFileRequest) returns (CreateFileResponse);
  rpc GetFile(GetFileRequest) returns (stream GetFileResponse);

  // path operations (file, dir, other?)
  rpc DeletePath(DeletePathRequest) returns (DeletePathResponse);
  rpc StatPath(StatPathRequest) returns (StatPathResponse);
  rpc UpdatePath(UpdatePathRequest) returns (UpdatePathResponse);
}
