syntax = "proto3";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "https://github.com/e2b-dev/infra/orchestrator";

message SandboxConfig {
  // Data required for creating a new sandbox.
  string template_id = 1;
  string build_id = 2;

  string kernel_version = 3;
  string firecracker_version = 4;

  bool huge_pages = 5;

  string sandbox_id = 6;
  map<string, string> env_vars = 7;

  // Metadata about the sandbox.
  map<string, string> metadata = 8;
  optional string alias = 9;
  string envd_version = 10;

  int64 vcpu = 11;
  int64 ram_mb = 12;

  string team_id = 13;
  // Maximum length of the sandbox in Hours.
  int64 max_sandbox_length = 14;

  int64 total_disk_size_mb = 15;

  bool snapshot = 16;
  string base_template_id = 17;

  bool auto_pause = 18;

  optional string envd_access_token = 19;
  string execution_id = 20;

  // Whether the sandbox should have access to the internet.
  // This is optional only for backwards compatibility.
  // After migration, the optional keyword can be removed.
  optional bool allow_internet_access = 21;

  optional SandboxNetworkConfig network = 22;

  repeated SandboxVolumeMount volumeMounts = 23;

  // Auto-resume policy for paused sandboxes.
  optional SandboxAutoResumeConfig auto_resume = 24;
}

message SandboxAutoResumeConfig {
  // Policy values are owned by the API layer today (e.g. "off", "any").
  string policy = 1;
}

message SandboxVolumeMount {
  string id = 1;
  string path = 2;
  string type = 3;
  string name = 4;
}

message SandboxNetworkConfig {
  optional SandboxNetworkEgressConfig egress = 1;
  optional SandboxNetworkIngressConfig ingress = 2;
}

message SandboxNetworkEgressConfig {
  repeated string allowed_cidrs = 1;
  repeated string denied_cidrs = 2;

  repeated string allowed_domains = 3;
}

message SandboxNetworkIngressConfig {
  optional string traffic_access_token = 1;
  optional string mask_request_host = 2;
}

message SandboxCreateRequest {
  SandboxConfig sandbox = 1;

  google.protobuf.Timestamp start_time = 2;
  google.protobuf.Timestamp end_time = 3;
}

message SandboxCreateResponse {
  string client_id = 1;
}

message SandboxUpdateRequest {
  string sandbox_id = 1;

  google.protobuf.Timestamp end_time = 2;
}

message SandboxDeleteRequest {
  string sandbox_id = 1;
}

message SandboxPauseRequest {
  string sandbox_id = 1;
  string template_id = 2;
  string build_id = 3;
}

message SandboxCheckpointRequest {
  string sandbox_id = 1;
  string build_id = 3;
}

message SandboxCheckpointResponse {
}

message RunningSandbox {
  SandboxConfig config = 1;
  string client_id = 2;

  google.protobuf.Timestamp start_time = 3;
  google.protobuf.Timestamp end_time = 4;
}

message SandboxListResponse {
  repeated RunningSandbox sandboxes = 1;
}

message CachedBuildInfo {
  string build_id = 1;
  google.protobuf.Timestamp expiration_time = 2;
}

message SandboxListCachedBuildsResponse {
  repeated CachedBuildInfo builds = 1;
}

service SandboxService {
  rpc Create(SandboxCreateRequest) returns (SandboxCreateResponse);
  rpc Update(SandboxUpdateRequest) returns (google.protobuf.Empty);
  rpc List(google.protobuf.Empty) returns (SandboxListResponse);
  rpc Delete(SandboxDeleteRequest) returns (google.protobuf.Empty);
  rpc Pause(SandboxPauseRequest) returns (google.protobuf.Empty);
  rpc Checkpoint(SandboxCheckpointRequest) returns (SandboxCheckpointResponse);

  rpc ListCachedBuilds(google.protobuf.Empty) returns (SandboxListCachedBuildsResponse);
}

message VolumeInfo {
  string volume_id = 1;
  string volume_type = 2;
  string team_id = 3;
}

message VolumeCreateRequest {
  VolumeInfo volume = 1;
}

message VolumeCreateResponse {
  EntryInfo entry = 1;
}

message VolumeDeleteRequest {
  VolumeInfo volume = 1;
}

message VolumeDeleteResponse {}

message VolumeDirectoryItem {
  EntryInfo entry = 1;
}

message VolumeDirListRequest {
  VolumeInfo volume = 1;
  string path = 2;
}

message VolumeDirListResponse {
  repeated VolumeDirectoryItem files = 1;
}

message VolumeDirCreateRequest {
  VolumeInfo volume = 1;
  string path = 2;
  optional uint32 mode = 3;
  optional uint32 uid = 4;
  optional uint32 gid = 5;
  bool create_parents = 6;
}

message VolumeDirCreateResponse {
  EntryInfo entry = 1;
}

message VolumeDirDeleteRequest {
  VolumeInfo volume = 1;
  string path = 2;
  bool recursive = 3;
}

message VolumeDirDeleteResponse {}

message VolumeFileGetRequest {
  VolumeInfo volume = 1;
  string path = 2;
}

message VolumeFileGetResponseStart {
  int64 size = 1;
}

message VolumeFileGetResponseContent {
  bytes content = 1;
}

message VolumeFileGetResponseFinish {}

message VolumeFileGetResponse {
  oneof message {
    VolumeFileGetResponseStart start = 1;
    VolumeFileGetResponseContent content = 2;
    VolumeFileGetResponseFinish finish = 3;
  }
}

message VolumeFileCreateStart {
  VolumeInfo volume = 1;
  string path = 2;
  optional uint32 mode = 3;
  optional uint32 uid = 4;
  optional uint32 gid = 5;
  bool force = 6;
}

message VolumeFileCreateContent {
  bytes content = 1;
}

message VolumeFileCreateFinish {
}

message VolumeFileCreateRequest {
  oneof message {
    VolumeFileCreateStart start = 1;
    VolumeFileCreateContent content = 2;
    VolumeFileCreateFinish finish = 3;
  }
}

message VolumeFileCreateResponse {
  EntryInfo entry = 1;
}

message VolumeFileDeleteRequest {
  VolumeInfo volume = 1;
  string path = 2;
}

message VolumeFileDeleteResponse {}

message StatRequest {
  VolumeInfo volume = 1;
  string path = 2;
}

message StatResponse {
  EntryInfo entry = 1;
}

enum FileType {
  FILE_TYPE_UNSPECIFIED = 0;
  FILE_TYPE_FILE = 1;
  FILE_TYPE_DIRECTORY = 2;
  FILE_TYPE_SYMLINK = 3;
}

message EntryInfo {
  string name = 1;
  FileType type = 2;
  string path = 3;
  int64 size = 4;
  uint32 mode = 5;
  uint32 uid = 6;
  uint32 gid = 7;
  google.protobuf.Timestamp modified_time = 8;
  // If the entry is a symlink, this field contains the target of the symlink.
  optional string symlink_target = 9;
  google.protobuf.Timestamp created_time = 10;
}

service VolumeService {
  rpc Create(VolumeCreateRequest) returns (VolumeCreateResponse);
  rpc Delete(VolumeDeleteRequest) returns (VolumeDeleteResponse);

  rpc ListDir(VolumeDirListRequest) returns (VolumeDirListResponse);
  rpc CreateDir(VolumeDirCreateRequest) returns (VolumeDirCreateResponse);
  rpc DeleteDir(VolumeDirDeleteRequest) returns (VolumeDirDeleteResponse);

  rpc GetFile(VolumeFileGetRequest) returns (stream VolumeFileGetResponse);
  rpc CreateFile(stream VolumeFileCreateRequest) returns (VolumeFileCreateResponse);
  rpc DeleteFile(VolumeFileDeleteRequest) returns (VolumeFileDeleteResponse);

  rpc Stat(StatRequest) returns (StatResponse);
}
