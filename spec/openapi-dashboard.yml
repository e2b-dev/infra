openapi: "3.0.0"

info:
  version: 0.1.0
  title: E2B Dashboard API

components:
  securitySchemes:
    AdminApiKeyAuth:
      type: apiKey
      in: header
      name: X-Admin-Token
    # AuthProviderBearerAuth / AuthProviderTeamAuth: B before T in the name
    # so Bearer is validated before Team.
    AuthProviderBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: access_token
    AuthProviderTeamAuth:
      type: apiKey
      in: header
      name: X-Team-ID

  parameters:
    build_id:
      name: build_id
      in: path
      required: true
      description: Identifier of the build.
      schema:
        type: string
        format: uuid
    sandboxID:
      name: sandboxID
      in: path
      required: true
      description: Identifier of the sandbox.
      schema:
        type: string
    builds_limit:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return per page.
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
        default: 50
    builds_cursor:
      name: cursor
      in: query
      required: false
      description: Cursor returned by the previous list response in `created_at|build_id` format.
      schema:
        type: string
    build_id_or_template:
      name: build_id_or_template
      in: query
      required: false
      description: Optional filter by build identifier, template identifier, or template alias.
      schema:
        type: string
    build_statuses:
      name: statuses
      in: query
      required: false
      description: Comma-separated list of build statuses to include.
      style: form
      explode: false
      schema:
        type: array
        items:
          $ref: "#/components/schemas/BuildStatus"
    build_ids:
      name: build_ids
      in: query
      required: true
      description: Comma-separated list of build IDs to get statuses for.
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string
          format: uuid
        maxItems: 100
        uniqueItems: true
    teamID:
      name: teamID
      in: path
      required: true
      description: Identifier of the team.
      schema:
        type: string
        format: uuid
    userId:
      name: userId
      in: path
      required: true
      description: Identifier of the user.
      schema:
        type: string
        format: uuid
    teamSlug:
      name: slug
      in: query
      required: true
      description: Team slug to resolve.
      schema:
        type: string
    templates_limit:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return per page.
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
        default: 50
    templateID:
      name: templateID
      in: path
      required: true
      description: Identifier of the template.
      schema:
        type: string
    tag:
      name: tag
      in: query
      required: true
      description: Template tag name to check.
      schema:
        type: string
        minLength: 1
    tag_assignment_limit:
      name: assignmentLimit
      in: query
      required: false
      description: Maximum number of ready assignment rows to return per tag.
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 25
        default: 6
    tag_path:
      name: tag
      in: path
      required: true
      description: Template tag name.
      schema:
        type: string
        minLength: 1
    tag_assignments_limit:
      name: limit
      in: query
      required: false
      description: Maximum number of assignment rows to return per page.
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
        default: 50
    templates_cursor:
      name: cursor
      in: query
      required: false
      description: Cursor returned by the previous list response in `{sort}|{value}|{templateID}` format. Rejected if its sort does not match the request.
      schema:
        type: string
    templates_public:
      name: public
      in: query
      required: false
      description: Filter templates by visibility (true = public, false = internal).
      schema:
        type: boolean
    templates_search:
      name: search
      in: query
      required: false
      description: Case-insensitive substring match on template names, aliases, and template id.
      schema:
        type: string
    templates_sort:
      name: sort
      in: query
      required: false
      description: Sort column and direction.
      schema:
        type: string
        enum:
          [
            created_at_asc,
            created_at_desc,
            updated_at_asc,
            updated_at_desc,
          ]
        default: created_at_desc
    tag_assignments_cursor:
      name: cursor
      in: query
      required: false
      description: Cursor returned by the previous list response in `assigned_at|assignment_id` format.
      schema:
        type: string
    tag_groups_limit:
      name: tagsLimit
      in: query
      required: false
      description: Maximum number of distinct tags to return per page.
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
        default: 25
    tag_groups_cursor:
      name: tagsCursor
      in: query
      required: false
      description: Cursor returned by the previous list response in `{sort}|{latest_assigned_at}|{tag}` format (sort-tagged, RFC3339Nano).
      schema:
        type: string
    tag_groups_search:
      name: search
      in: query
      required: false
      description: Case-insensitive substring filter on tag name. Allowed characters are `a-z`, `0-9`, `.`, `_`, `-`.
      schema:
        type: string
        maxLength: 64
        pattern: "^[a-z0-9._-]*$"
    tag_groups_sort:
      name: sort
      in: query
      required: false
      description: Sort order for the returned tag groups.
      schema:
        type: string
        enum: [latest_desc, latest_asc, name_asc, name_desc]
        default: latest_desc

  responses:
    "400":
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    "401":
      description: Authentication error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    "403":
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    "404":
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    "409":
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    "500":
      description: Server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    "502":
      description: Upstream error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
          description: Error code.
        message:
          type: string
          description: Error message.

    AdminAuthProviderProfile:
      type: object
      required:
        - userId
        - email
      properties:
        userId:
          type: string
          format: uuid
          description: Internal E2B user identifier.
        email:
          type: string
          nullable: true
          description: Email address from the configured auth provider.

    AdminAuthProviderProfilesResponse:
      type: object
      required:
        - profiles
      properties:
        profiles:
          type: array
          items:
            $ref: "#/components/schemas/AdminAuthProviderProfile"

    AdminAuthProviderProfilesResolveRequest:
      type: object
      required:
        - userIds
      properties:
        userIds:
          type: array
          minItems: 1
          maxItems: 100
          uniqueItems: true
          items:
            type: string
            format: uuid

    AdminAuthProviderProfilesLookupEmailRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    AdminAuthProviderUserBootstrapRequest:
      type: object
      required:
        - oidc_issuer
        - oidc_user_id
        - oidc_user_email
      properties:
        oidc_issuer:
          type: string
          minLength: 1
        oidc_user_id:
          type: string
          minLength: 1
        oidc_user_email:
          type: string
          format: email
        oidc_user_name:
          type: string
          nullable: true
        signup_ip:
          type: string
        signup_user_agent:
          type: string

    AdminTeamBootstrapRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          minLength: 1
          description: Team name.
        email:
          type: string
          format: email
          description: Billing/contact email for the team.

    BuildStatus:
      type: string
      description: Build status mapped for dashboard clients.
      enum:
        - building
        - failed
        - success

    ListedBuild:
      type: object
      required:
        - id
        - template
        - templateId
        - status
        - statusMessage
        - createdAt
        - finishedAt
        - cpuCount
        - memoryMB
        - diskSizeMB
        - envdVersion
      properties:
        id:
          type: string
          format: uuid
          description: Identifier of the build.
        template:
          type: string
          description: Template alias when present, otherwise template ID.
        templateId:
          type: string
          description: Identifier of the template.
        status:
          $ref: "#/components/schemas/BuildStatus"
        statusMessage:
          type: string
          nullable: true
          description: Failure message when status is `failed`, otherwise `null`.
        createdAt:
          type: string
          format: date-time
          description: Build creation timestamp in RFC3339 format.
        finishedAt:
          type: string
          format: date-time
          nullable: true
          description: Build completion timestamp in RFC3339 format, if finished.
        cpuCount:
          type: integer
          format: int64
          description: CPU cores configured for the build.
        memoryMB:
          type: integer
          format: int64
          description: Memory in MiB configured for the build.
        diskSizeMB:
          type: integer
          format: int64
          nullable: true
          description: Disk size in MiB configured for the build, if recorded.
        envdVersion:
          type: string
          nullable: true
          description: envd version the build was created with, if recorded.

    BuildsListResponse:
      type: object
      required:
        - data
        - nextCursor
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ListedBuild"
        nextCursor:
          type: string
          nullable: true
          description: Cursor to pass to the next list request, or `null` if there is no next page. 

    BuildStatusItem:
      type: object
      required:
        - id
        - status
        - finishedAt
        - statusMessage
      properties:
        id:
          type: string
          format: uuid
          description: Identifier of the build.
        status:
          $ref: "#/components/schemas/BuildStatus"
        finishedAt:
          type: string
          format: date-time
          nullable: true
          description: Build completion timestamp in RFC3339 format, if finished.
        statusMessage:
          type: string
          nullable: true
          description: Failure message when status is `failed`, otherwise `null`.

    BuildsStatusesResponse:
      type: object
      required:
        - buildStatuses
      properties:
        buildStatuses:
          type: array
          description: List of build statuses
          items:
            $ref: "#/components/schemas/BuildStatusItem"

    BuildInfo:
      type: object
      required:
        - createdAt
        - finishedAt
        - status
        - statusMessage
      properties:
        names:
          type: array
          items:
            type: string
          nullable: true
          description: Template names related to this build, if available.
        createdAt:
          type: string
          format: date-time
          description: Build creation timestamp in RFC3339 format.
        finishedAt:
          type: string
          format: date-time
          nullable: true
          description: Build completion timestamp in RFC3339 format, if finished.
        status:
          $ref: "#/components/schemas/BuildStatus"
        statusMessage:
          type: string
          nullable: true
          description: Failure message when status is `failed`, otherwise `null`.

    CPUCount:
      type: integer
      format: int64
      minimum: 1
      description: CPU cores for the sandbox

    MemoryMB:
      type: integer
      format: int64
      minimum: 128
      description: Memory for the sandbox in MiB

    DiskSizeMB:
      type: integer
      format: int64
      minimum: 0
      description: Disk size for the sandbox in MiB

    SandboxRecord:
      type: object
      required:
        - templateID
        - sandboxID
        - startedAt
        - cpuCount
        - memoryMB
        - diskSizeMB
        - retentionExpired
      properties:
        templateID:
          type: string
          description: Identifier of the template from which is the sandbox created
        alias:
          type: string
          description: Alias of the template
        sandboxID:
          type: string
          description: Identifier of the sandbox
        startedAt:
          type: string
          format: date-time
          description: Time when the sandbox was started
        stoppedAt:
          type: string
          format: date-time
          nullable: true
          description: Time when the sandbox was stopped
        domain:
          type: string
          nullable: true
          description: Base domain where the sandbox traffic is accessible
        cpuCount:
          $ref: "#/components/schemas/CPUCount"
        memoryMB:
          $ref: "#/components/schemas/MemoryMB"
        diskSizeMB:
          $ref: "#/components/schemas/DiskSizeMB"
        retentionExpired:
          type: boolean
          description: Whether the sandbox ended more than the retention window ago, so its monitoring, events, and logs data is no longer available

    HealthResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Human-readable health check result.

    UserTeamLimits:
      type: object
      required:
        - maxLengthHours
        - concurrentSandboxes
        - concurrentTemplateBuilds
        - maxVcpu
        - maxRamMb
        - diskMb
      properties:
        maxLengthHours:
          type: integer
          format: int64
        concurrentSandboxes:
          type: integer
          format: int32
        concurrentTemplateBuilds:
          type: integer
          format: int32
        maxVcpu:
          type: integer
          format: int32
        maxRamMb:
          type: integer
          format: int32
        diskMb:
          type: integer
          format: int32

    UserTeam:
      type: object
      required:
        - id
        - name
        - slug
        - tier
        - email
        - profilePictureUrl
        - isBlocked
        - isBanned
        - blockedReason
        - isDefault
        - limits
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        tier:
          type: string
        email:
          type: string
        profilePictureUrl:
          type: string
          nullable: true
        isBlocked:
          type: boolean
        isBanned:
          type: boolean
        blockedReason:
          type: string
          nullable: true
        isDefault:
          type: boolean
        limits:
          $ref: "#/components/schemas/UserTeamLimits"
        createdAt:
          type: string
          format: date-time

    UserTeamsResponse:
      type: object
      required:
        - teams
      properties:
        teams:
          type: array
          items:
            $ref: "#/components/schemas/UserTeam"

    TeamMember:
      type: object
      required:
        - id
        - email
        - isDefault
        - createdAt
        - providers
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
          nullable: true
        profilePictureUrl:
          type: string
          format: uri
          nullable: true
        providers:
          type: array
          items:
            type: string
        isDefault:
          type: boolean
        addedBy:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true

    TeamMembersResponse:
      type: object
      required:
        - members
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/TeamMember"

    UpdateTeamRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        profilePictureUrl:
          type: string
          nullable: true

    UpdateTeamResponse:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        profilePictureUrl:
          type: string
          nullable: true

    AddTeamMemberRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    CreateTeamRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255

    DefaultTemplateAlias:
      type: object
      required:
        - alias
      properties:
        alias:
          type: string
        namespace:
          type: string
          nullable: true

    DefaultTemplate:
      type: object
      required:
        - id
        - aliases
        - buildId
        - ramMb
        - vcpu
        - totalDiskSizeMb
        - createdAt
        - public
        - buildCount
        - spawnCount
      properties:
        id:
          type: string
        aliases:
          type: array
          items:
            $ref: "#/components/schemas/DefaultTemplateAlias"
        buildId:
          type: string
          format: uuid
        ramMb:
          type: integer
          format: int64
        vcpu:
          type: integer
          format: int64
        totalDiskSizeMb:
          type: integer
          format: int64
          nullable: true
        envdVersion:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        public:
          type: boolean
        buildCount:
          type: integer
          format: int32
        spawnCount:
          type: integer
          format: int64

    DefaultTemplatesResponse:
      type: object
      required:
        - templates
      properties:
        templates:
          type: array
          items:
            $ref: "#/components/schemas/DefaultTemplate"

    TeamTemplate:
      type: object
      required:
        - templateID
        - buildID
        - cpuCount
        - memoryMB
        - diskSizeMB
        - public
        - aliases
        - names
        - createdAt
        - updatedAt
        - createdBy
        - lastSpawnedAt
        - spawnCount
        - buildCount
        - envdVersion
        - isDefault
      properties:
        templateID:
          type: string
        buildID:
          type: string
          format: uuid
        cpuCount:
          type: integer
          format: int64
        memoryMB:
          type: integer
          format: int64
        diskSizeMB:
          type: integer
          format: int64
          nullable: true
        public:
          type: boolean
        aliases:
          type: array
          items:
            type: string
        names:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdBy:
          nullable: true
          type: object
          required:
            - id
          properties:
            id:
              type: string
              format: uuid
            email:
              type: string
              nullable: true
        lastSpawnedAt:
          type: string
          format: date-time
          nullable: true
        spawnCount:
          type: integer
          format: int64
        buildCount:
          type: integer
          format: int32
        envdVersion:
          type: string
          nullable: true
        isDefault:
          type: boolean
        defaultDescription:
          type: string
          nullable: true

    TeamTemplatesResponse:
      type: object
      required:
        - data
        - nextCursor
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TeamTemplate"
        nextCursor:
          type: string
          nullable: true
          description: Cursor to pass to the next list request, or `null` if there is no next page.

    TemplateDetail:
      type: object
      description: Dashboard-shaped single-template read. Mirrors the infra-api `Template` schema fields the dashboard renders.
      required:
        - templateID
        - buildID
        - cpuCount
        - memoryMB
        - diskSizeMB
        - public
        - aliases
        - names
        - createdAt
        - updatedAt
        - lastSpawnedAt
        - spawnCount
        - buildCount
        - envdVersion
      properties:
        templateID:
          type: string
          description: Identifier of the template.
        buildID:
          type: string
          description: Identifier of the latest ready build for the template, or the zero UUID when none.
        cpuCount:
          allOf:
            - $ref: "#/components/schemas/CPUCount"
          nullable: true
          description: vCPU count of the latest ready default build, or `null` when none.
        memoryMB:
          allOf:
            - $ref: "#/components/schemas/MemoryMB"
          nullable: true
          description: Memory in MiB of the latest ready default build, or `null` when none.
        diskSizeMB:
          allOf:
            - $ref: "#/components/schemas/DiskSizeMB"
          nullable: true
          description: Disk size in MiB of the latest ready default build, or `null` when none.
        public:
          type: boolean
          description: Whether the template is public or only accessible by the team.
        aliases:
          type: array
          description: Aliases of the template.
          deprecated: true
          items:
            type: string
        names:
          type: array
          description: Names of the template (namespace/alias format when namespaced).
          items:
            type: string
        createdAt:
          type: string
          format: date-time
          description: Time when the template was created.
        updatedAt:
          type: string
          format: date-time
          description: Time when the template was last updated.
        lastSpawnedAt:
          type: string
          format: date-time
          nullable: true
          description: Time when the template was last used.
        spawnCount:
          type: integer
          format: int64
          description: Number of times the template was used.
        buildCount:
          type: integer
          format: int32
          description: Number of times the template was built.
        envdVersion:
          type: string
          nullable: true
          description: envd version of the latest ready default build, or `null` when none.

    TemplateTagAssignment:
      type: object
      required:
        - assignmentId
        - buildId
        - assignedAt
        - buildCreatedAt
        - buildFinishedAt
      properties:
        assignmentId:
          type: string
          format: uuid
          description: Identifier of the tag assignment event.
        buildId:
          type: string
          format: uuid
          description: Identifier of the assigned build.
        assignedAt:
          type: string
          format: date-time
          description: Time when the tag was assigned to the build.
        buildCreatedAt:
          type: string
          format: date-time
          description: Time when the assigned build was created.
        buildFinishedAt:
          type: string
          format: date-time
          nullable: true
          description: Time when the assigned build finished.

    TemplateTagGroup:
      type: object
      required:
        - tag
        - assignments
        - hasMore
      properties:
        tag:
          type: string
          description: Template tag name.
        assignments:
          type: array
          description: Ready assignment events for this tag, sorted latest first.
          items:
            $ref: "#/components/schemas/TemplateTagAssignment"
        hasMore:
          type: boolean
          description: Whether more ready assignment events exist beyond the requested assignment limit.

    TemplateTagGroupsResponse:
      type: object
      required:
        - tags
        - nextCursor
      properties:
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TemplateTagGroup"
        nextCursor:
          type: string
          nullable: true
          description: Cursor to pass as `tagsCursor` for the next page, or `null` if there is no next page.

    TemplateTagsCountResponse:
      type: object
      required:
        - total
      properties:
        total:
          type: integer
          format: int64
          description: Total distinct ready tags for the template.

    TemplateTagExistsResponse:
      type: object
      required:
        - exists
        - normalizedTag
      properties:
        exists:
          type: boolean
          description: Whether the template tag has at least one ready assignment.
        normalizedTag:
          type: string
          description: Normalized template tag name.

    TemplateTagAssignmentsResponse:
      type: object
      required:
        - data
        - nextCursor
      properties:
        data:
          type: array
          description: Ready assignment events for the tag, sorted latest first.
          items:
            $ref: "#/components/schemas/TemplateTagAssignment"
        nextCursor:
          type: string
          nullable: true
          description: Cursor to pass to the next list request, or `null` if there is no next page.

    TeamResolveResponse:
      type: object
      required:
        - id
        - slug
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string

tags:
  - name: builds
  - name: sandboxes
  - name: teams
  - name: templates

paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Health check successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

