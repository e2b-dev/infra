openapi: "3.0.0"

info:
  version: 0.1.0
  title: E2B Dashboard API

components:
  securitySchemes:
    AdminApiKeyAuth:
      type: apiKey
      in: header
      name: X-Admin-Token
    # Generated code uses security schemas in the alphabetical order.
    # In order to check first the token, and then the team (so we can already use the user),
    # there is a 1 and 2 present in the names of the security schemas.
    Supabase1TokenAuth:
      type: apiKey
      in: header
      name: X-Supabase-Token
    Supabase2TeamAuth:
      type: apiKey
      in: header
      name: X-Supabase-Team
    # AuthProviderBearerAuth / AuthProviderTeamAuth: B before T in the name
    # so Bearer is validated before Team (same reason as Supabase1/2 above).
    AuthProviderBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: access_token
    AuthProviderTeamAuth:
      type: apiKey
      in: header
      name: X-Team-ID

  parameters:
    build_id:
      name: build_id
      in: path
      required: true
      description: Identifier of the build.
      schema:
        type: string
        format: uuid
    sandboxID:
      name: sandboxID
      in: path
      required: true
      description: Identifier of the sandbox.
      schema:
        type: string
    builds_limit:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return per page.
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
        default: 50
    builds_cursor:
      name: cursor
      in: query
      required: false
      description: Cursor returned by the previous list response in `created_at|build_id` format.
      schema:
        type: string
    build_id_or_template:
      name: build_id_or_template
      in: query
      required: false
      description: Optional filter by build identifier, template identifier, or template alias.
      schema:
        type: string
    build_statuses:
      name: statuses
      in: query
      required: false
      description: Comma-separated list of build statuses to include.
      style: form
      explode: false
      schema:
        type: array
        items:
          $ref: "#/components/schemas/BuildStatus"
    build_ids:
      name: build_ids
      in: query
      required: true
      description: Comma-separated list of build IDs to get statuses for.
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string
          format: uuid
        maxItems: 100
        uniqueItems: true
    teamID:
      name: teamID
      in: path
      required: true
      description: Identifier of the team.
      schema:
        type: string
        format: uuid
    userId:
      name: userId
      in: path
      required: true
      description: Identifier of the user.
      schema:
        type: string
        format: uuid
    teamSlug:
      name: slug
      in: query
      required: true
      description: Team slug to resolve.
      schema:
        type: string
    templates_limit:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return per page.
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
        default: 50
    templates_cursor:
      name: cursor
      in: query
      required: false
      description: Cursor returned by the previous list response in `{sort}|{value}|{templateID}` format. Rejected if its sort does not match the request.
      schema:
        type: string
    templates_cpu_count:
      name: cpuCount
      in: query
      required: false
      description: Filter templates by exact vCPU count.
      schema:
        type: integer
        format: int32
        minimum: 1
    templates_memory_mb:
      name: memoryMB
      in: query
      required: false
      description: Filter templates by exact memory size in MB.
      schema:
        type: integer
        format: int32
        minimum: 1
    templates_public:
      name: public
      in: query
      required: false
      description: Filter templates by visibility (true = public, false = internal).
      schema:
        type: boolean
    templates_search:
      name: search
      in: query
      required: false
      description: Case-insensitive substring match on template names, aliases, and template id.
      schema:
        type: string
    templates_sort:
      name: sort
      in: query
      required: false
      description: Sort column and direction.
      schema:
        type: string
        enum:
          [
            name_asc,
            name_desc,
            cpu_count_asc,
            cpu_count_desc,
            memory_mb_asc,
            memory_mb_desc,
            created_at_asc,
            created_at_desc,
            updated_at_asc,
            updated_at_desc,
          ]
        default: created_at_desc

  responses:
    "400":
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    "401":
      description: Authentication error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    "403":
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    "404":
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    "500":
      description: Server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    "502":
      description: Upstream error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
          description: Error code.
        message:
          type: string
          description: Error message.

    AdminAuthProviderProfile:
      type: object
      required:
        - userId
        - email
      properties:
        userId:
          type: string
          format: uuid
          description: Internal E2B user identifier.
        email:
          type: string
          nullable: true
          description: Email address from the configured auth provider.

    AdminAuthProviderProfilesResponse:
      type: object
      required:
        - profiles
      properties:
        profiles:
          type: array
          items:
            $ref: "#/components/schemas/AdminAuthProviderProfile"

    AdminAuthProviderProfilesResolveRequest:
      type: object
      required:
        - userIds
      properties:
        userIds:
          type: array
          minItems: 1
          maxItems: 100
          uniqueItems: true
          items:
            type: string
            format: uuid

    AdminAuthProviderProfilesLookupEmailRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    AdminAuthProviderUserBootstrapRequest:
      type: object
      required:
        - oidc_issuer
        - oidc_user_id
        - oidc_user_email
      properties:
        oidc_issuer:
          type: string
          minLength: 1
        oidc_user_id:
          type: string
          minLength: 1
        oidc_user_email:
          type: string
          format: email
        oidc_user_name:
          type: string
          nullable: true

    AdminTeamBootstrapRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          minLength: 1
          description: Team name.
        email:
          type: string
          format: email
          description: Billing/contact email for the team.

    BuildStatus:
      type: string
      description: Build status mapped for dashboard clients.
      enum:
        - building
        - failed
        - success

    ListedBuild:
      type: object
      required:
        - id
        - template
        - templateId
        - status
        - statusMessage
        - createdAt
        - finishedAt
      properties:
        id:
          type: string
          format: uuid
          description: Identifier of the build.
        template:
          type: string
          description: Template alias when present, otherwise template ID.
        templateId:
          type: string
          description: Identifier of the template.
        status:
          $ref: "#/components/schemas/BuildStatus"
        statusMessage:
          type: string
          nullable: true
          description: Failure message when status is `failed`, otherwise `null`.
        createdAt:
          type: string
          format: date-time
          description: Build creation timestamp in RFC3339 format.
        finishedAt:
          type: string
          format: date-time
          nullable: true
          description: Build completion timestamp in RFC3339 format, if finished.

    BuildsListResponse:
      type: object
      required:
        - data
        - nextCursor
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ListedBuild"
        nextCursor:
          type: string
          nullable: true
          description: Cursor to pass to the next list request, or `null` if there is no next page. 

    BuildStatusItem:
      type: object
      required:
        - id
        - status
        - finishedAt
        - statusMessage
      properties:
        id:
          type: string
          format: uuid
          description: Identifier of the build.
        status:
          $ref: "#/components/schemas/BuildStatus"
        finishedAt:
          type: string
          format: date-time
          nullable: true
          description: Build completion timestamp in RFC3339 format, if finished.
        statusMessage:
          type: string
          nullable: true
          description: Failure message when status is `failed`, otherwise `null`.

    BuildsStatusesResponse:
      type: object
      required:
        - buildStatuses
      properties:
        buildStatuses:
          type: array
          description: List of build statuses
          items:
            $ref: "#/components/schemas/BuildStatusItem"

    BuildInfo:
      type: object
      required:
        - createdAt
        - finishedAt
        - status
        - statusMessage
      properties:
        names:
          type: array
          items:
            type: string
          nullable: true
          description: Template names related to this build, if available.
        createdAt:
          type: string
          format: date-time
          description: Build creation timestamp in RFC3339 format.
        finishedAt:
          type: string
          format: date-time
          nullable: true
          description: Build completion timestamp in RFC3339 format, if finished.
        status:
          $ref: "#/components/schemas/BuildStatus"
        statusMessage:
          type: string
          nullable: true
          description: Failure message when status is `failed`, otherwise `null`.

    CPUCount:
      type: integer
      format: int64
      minimum: 1
      description: CPU cores for the sandbox

    MemoryMB:
      type: integer
      format: int64
      minimum: 128
      description: Memory for the sandbox in MiB

    DiskSizeMB:
      type: integer
      format: int64
      minimum: 0
      description: Disk size for the sandbox in MiB

    SandboxRecord:
      type: object
      required:
        - templateID
        - sandboxID
        - startedAt
        - cpuCount
        - memoryMB
        - diskSizeMB
      properties:
        templateID:
          type: string
          description: Identifier of the template from which is the sandbox created
        alias:
          type: string
          description: Alias of the template
        sandboxID:
          type: string
          description: Identifier of the sandbox
        startedAt:
          type: string
          format: date-time
          description: Time when the sandbox was started
        stoppedAt:
          type: string
          format: date-time
          nullable: true
          description: Time when the sandbox was stopped
        domain:
          type: string
          nullable: true
          description: Base domain where the sandbox traffic is accessible
        cpuCount:
          $ref: "#/components/schemas/CPUCount"
        memoryMB:
          $ref: "#/components/schemas/MemoryMB"
        diskSizeMB:
          $ref: "#/components/schemas/DiskSizeMB"

    HealthResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Human-readable health check result.

    UserTeamLimits:
      type: object
      required:
        - maxLengthHours
        - concurrentSandboxes
        - concurrentTemplateBuilds
        - maxVcpu
        - maxRamMb
        - diskMb
      properties:
        maxLengthHours:
          type: integer
          format: int64
        concurrentSandboxes:
          type: integer
          format: int32
        concurrentTemplateBuilds:
          type: integer
          format: int32
        maxVcpu:
          type: integer
          format: int32
        maxRamMb:
          type: integer
          format: int32
        diskMb:
          type: integer
          format: int32

    UserTeam:
      type: object
      required:
        - id
        - name
        - slug
        - tier
        - email
        - profilePictureUrl
        - isBlocked
        - isBanned
        - blockedReason
        - isDefault
        - limits
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        tier:
          type: string
        email:
          type: string
        profilePictureUrl:
          type: string
          nullable: true
        isBlocked:
          type: boolean
        isBanned:
          type: boolean
        blockedReason:
          type: string
          nullable: true
        isDefault:
          type: boolean
        limits:
          $ref: "#/components/schemas/UserTeamLimits"
        createdAt:
          type: string
          format: date-time

    UserTeamsResponse:
      type: object
      required:
        - teams
      properties:
        teams:
          type: array
          items:
            $ref: "#/components/schemas/UserTeam"

    TeamMember:
      type: object
      required:
        - id
        - email
        - isDefault
        - createdAt
        - providers
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
          nullable: true
        profilePictureUrl:
          type: string
          format: uri
          nullable: true
        providers:
          type: array
          items:
            type: string
        isDefault:
          type: boolean
        addedBy:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true

    TeamMembersResponse:
      type: object
      required:
        - members
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/TeamMember"

    UpdateTeamRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        profilePictureUrl:
          type: string
          nullable: true

    UpdateTeamResponse:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        profilePictureUrl:
          type: string
          nullable: true

    AddTeamMemberRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    CreateTeamRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255

    DefaultTemplateAlias:
      type: object
      required:
        - alias
      properties:
        alias:
          type: string
        namespace:
          type: string
          nullable: true

    DefaultTemplate:
      type: object
      required:
        - id
        - aliases
        - buildId
        - ramMb
        - vcpu
        - totalDiskSizeMb
        - createdAt
        - public
        - buildCount
        - spawnCount
      properties:
        id:
          type: string
        aliases:
          type: array
          items:
            $ref: "#/components/schemas/DefaultTemplateAlias"
        buildId:
          type: string
          format: uuid
        ramMb:
          type: integer
          format: int64
        vcpu:
          type: integer
          format: int64
        totalDiskSizeMb:
          type: integer
          format: int64
          nullable: true
        envdVersion:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        public:
          type: boolean
        buildCount:
          type: integer
          format: int32
        spawnCount:
          type: integer
          format: int64

    DefaultTemplatesResponse:
      type: object
      required:
        - templates
      properties:
        templates:
          type: array
          items:
            $ref: "#/components/schemas/DefaultTemplate"

    TeamTemplate:
      type: object
      required:
        - templateID
        - buildID
        - cpuCount
        - memoryMB
        - diskSizeMB
        - public
        - aliases
        - names
        - createdAt
        - updatedAt
        - createdBy
        - lastSpawnedAt
        - spawnCount
        - buildCount
        - envdVersion
        - isDefault
      properties:
        templateID:
          type: string
        buildID:
          type: string
          format: uuid
        cpuCount:
          type: integer
          format: int64
        memoryMB:
          type: integer
          format: int64
        diskSizeMB:
          type: integer
          format: int64
          nullable: true
        public:
          type: boolean
        aliases:
          type: array
          items:
            type: string
        names:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdBy:
          nullable: true
          type: object
          required:
            - id
          properties:
            id:
              type: string
              format: uuid
            email:
              type: string
              nullable: true
        lastSpawnedAt:
          type: string
          format: date-time
          nullable: true
        spawnCount:
          type: integer
          format: int64
        buildCount:
          type: integer
          format: int32
        envdVersion:
          type: string
          nullable: true
        isDefault:
          type: boolean
        defaultDescription:
          type: string
          nullable: true

    TeamTemplatesResponse:
      type: object
      required:
        - data
        - nextCursor
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TeamTemplate"
        nextCursor:
          type: string
          nullable: true
          description: Cursor to pass to the next list request, or `null` if there is no next page.

    TeamResolveResponse:
      type: object
      required:
        - id
        - slug
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string

tags:
  - name: builds
  - name: sandboxes
  - name: teams
  - name: templates

paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Health check successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /builds:
    get:
      summary: List team builds
      tags: [builds]
      security:
        - Supabase1TokenAuth: []
          Supabase2TeamAuth: []
        - AuthProviderBearerAuth: []
          AuthProviderTeamAuth: []
      parameters:
        - $ref: "#/components/parameters/build_id_or_template"
        - $ref: "#/components/parameters/build_statuses"
        - $ref: "#/components/parameters/builds_limit"
        - $ref: "#/components/parameters/builds_cursor"
      responses:
        "200":
          description: Successfully returned paginated builds.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildsListResponse"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "500":
          $ref: "#/components/responses/500"

  /builds/statuses:
    get:
      summary: Get build statuses
      tags: [builds]
      security:
        - Supabase1TokenAuth: []
          Supabase2TeamAuth: []
        - AuthProviderBearerAuth: []
          AuthProviderTeamAuth: []
      parameters:
        - $ref: "#/components/parameters/build_ids"

      responses:
        "200":
          description: Successfully returned build statuses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildsStatusesResponse"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "500":
          $ref: "#/components/responses/500"

  /builds/{build_id}:
    get:
      summary: Get build details
      tags: [builds]
      security:
        - Supabase1TokenAuth: []
          Supabase2TeamAuth: []
        - AuthProviderBearerAuth: []
          AuthProviderTeamAuth: []
      parameters:
        - $ref: "#/components/parameters/build_id"
      responses:
        "200":
          description: Successfully returned build details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildInfo"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /sandboxes/{sandboxID}/record:
    get:
      summary: Get sandbox record
      tags: [sandboxes]
      security:
        - Supabase1TokenAuth: []
          Supabase2TeamAuth: []
        - AuthProviderBearerAuth: []
          AuthProviderTeamAuth: []
      parameters:
        - $ref: "#/components/parameters/sandboxID"
      responses:
        "200":
          description: Successfully returned sandbox details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxRecord"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /teams:
    get:
      summary: List user teams
      description: Returns all teams the authenticated user belongs to, with limits and default flag.
      tags: [teams]
      security:
        - Supabase1TokenAuth: []
        - AuthProviderBearerAuth: []
      responses:
        "200":
          description: Successfully returned user teams.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserTeamsResponse"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    post:
      summary: Create team
      tags: [teams]
      security:
        - Supabase1TokenAuth: []
        - AuthProviderBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamRequest"
      responses:
        "200":
          description: Successfully created team.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamResolveResponse"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /admin/users/{userId}/bootstrap:
    post:
      summary: Bootstrap user
      tags: [teams]
      security:
        - AdminApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/userId"
      responses:
        "200":
          description: Successfully bootstrapped user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamResolveResponse"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /admin/users/bootstrap:
    post:
      summary: Bootstrap auth provider user
      tags: [teams]
      security:
        - AdminApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAuthProviderUserBootstrapRequest"
      responses:
        "200":
          description: Successfully bootstrapped user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamResolveResponse"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /admin/teams/bootstrap:
    post:
      summary: Bootstrap team
      description: Creates and provisions a team for an admin-authenticated bootstrap workflow.
      tags: [admin]
      security:
        - AdminApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminTeamBootstrapRequest"
      responses:
        "200":
          description: Successfully bootstrapped team.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamResolveResponse"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "502":
          $ref: "#/components/responses/502"
        "500":
          $ref: "#/components/responses/500"

  /admin/user-profiles/resolve:
    post:
      summary: Resolve user profiles
      tags: [admin]
      security:
        - AdminApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAuthProviderProfilesResolveRequest"
      responses:
