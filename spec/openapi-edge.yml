openapi: 3.0.0
info:
  version: 0.1.0
  title: E2B Edge

components:
  securitySchemes:
    # todo

  responses:
    "400":
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    "401":
      description: Authentication error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    "404":
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    "409":
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    "500":
      description: Server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    ClusterNode:
      required:
        - id
        - version
        - type
        - nodeIp
        - nodePort
        - registeredAt
        - expiresAt
        - status
      properties:
        id:
          type: string
          description: Node ID
        version:
            type: string
            description: Version of the node
        type:
          $ref: "#/components/schemas/ClusterNodeType"
        nodeIp:
          type: string
          description: Node private IPv4 address
        nodePort:
          type: integer
          description: Node main service port
        registeredAt:
          type: string
          format: date-time
          description: Time when the node was registered
        expiresAt:
            type: string
            format: date-time
            description: Time when the node will expire
        status:
          $ref: "#/components/schemas/ClusterNodeStatus"

    ClusterNodeStatus:
      type: string
      description: State of the cluster node
      enum:
        - healthy
        - draining
        - unhealthy

    ClusterNodeType:
      type: string
      description: Cluster node type
      enum:
        - compute
        - edge

    Error:
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
          description: Error code
        message:
          type: string
          description: Error

tags:
  - name: service-discovery

paths:
  /health:
    get:
      description: Health check
      responses:
        "200":
          description: Request was successful
        "401":
          $ref: "#/components/responses/401"

  /health/traffic:
    get:
      description: Health check for sandbox traffic proxy
      responses:
        "200":
          description: Request was successful
        "401":
          $ref: "#/components/responses/401"

  /v1/service-discovery/nodes:
    get:
        description: Get the service discovery information
        tags: [service-discovery]
        responses:
          "200":
            description: Successfully returned all cluster nodes
            content:
              application/json:
                schema:
                  type: array
                  items:
                    allOf:
                      - $ref: "#/components/schemas/ClusterNode"
          "401":
            $ref: "#/components/responses/401"
          "500":
            $ref: "#/components/responses/500"

  /v1/service-discovery/nodes/{nodeId}/drain:
    post:
      description: Drain a node
      tags: [service-discovery]
      parameters:
        - name: nodeId
          in: path
          required: true
          description: Node ID
          schema:
            type: string
      responses:
        "200":
          description: Successfully start of node draining
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /v1/service-discovery/nodes/{nodeId}/update:
    post:
      description: Update a node with safe draining
      tags: [service-discovery]
      parameters:
        - name: nodeId
          in: path
          required: true
          description: Node ID
          schema:
            type: string
      responses:
        "200":
          description: Successfully updated the node
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"
