have_fun: false

code_review:
  disable: false
  # Only surface medium-or-worse findings; drop nits and stylistic suggestions.
  comment_severity_threshold: MEDIUM
  # Cap the number of review comments per PR to avoid noise floods.
  max_review_comments: 10
  pull_request_opened:
    help: false
    # Suppress the auto PR summary. We rely on the author's description.
    summary: false
    code_review: true
    include_drafts: false

ignore_patterns:
  - "**/*.gen.go"
  - "**/*.sql.go"
  - "**/*.pb.go"
  - "**/mocks/**"
  - "**/testdata/**"
  - "**/*.md"
