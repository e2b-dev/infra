<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E2B Infrastructure - Code Map</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #e6edf3; height: 100vh; overflow: hidden; }
  .layout { display: flex; height: 100vh; }
  .sidebar { width: 290px; min-width: 290px; background: #161b22; border-right: 1px solid #30363d; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .sidebar h1 { font-size: 15px; font-weight: 600; color: #e6edf3; letter-spacing: -0.3px; }
  .sidebar h2 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e; margin-bottom: 8px; }
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .canvas-wrap { flex: 1; position: relative; overflow: hidden; }
  .canvas-wrap svg { width: 100%; height: 100%; cursor: grab; }
  .canvas-wrap svg:active { cursor: grabbing; }
  .zoom-controls { position: absolute; top: 12px; right: 12px; display: flex; gap: 4px; align-items: center; }
  .zoom-controls button, .zoom-controls span { background: #21262d; border: 1px solid #30363d; color: #e6edf3; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: monospace; }
  .zoom-controls button:hover { background: #30363d; }
  .zoom-controls span { cursor: default; min-width: 48px; text-align: center; }
  .legend { position: absolute; bottom: 12px; left: 12px; background: #161b22ee; border: 1px solid #30363d; border-radius: 8px; padding: 10px 14px; display: flex; gap: 14px; flex-wrap: wrap; font-size: 11px; }
  .legend-item { display: flex; align-items: center; gap: 5px; color: #8b949e; }
  .legend-line { width: 24px; height: 2px; border-radius: 1px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .prompt-area { border-top: 1px solid #30363d; background: #161b22; padding: 12px 16px; max-height: 180px; display: flex; flex-direction: column; }
  .prompt-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .prompt-header span { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e; }
  .copy-btn { background: #238636; border: none; color: #fff; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; transition: background 0.15s; }
  .copy-btn:hover { background: #2ea043; }
  .copy-btn.copied { background: #1a7f37; }
  .prompt-text { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; color: #c9d1d9; line-height: 1.5; overflow-y: auto; flex: 1; white-space: pre-wrap; }
  .provider-toggle { display: flex; gap: 0; border-radius: 8px; overflow: hidden; border: 1px solid #30363d; }
  .provider-btn { flex: 1; padding: 8px 0; border: none; cursor: pointer; font-size: 12px; font-weight: 600; text-align: center; transition: all 0.15s; background: #21262d; color: #8b949e; }
  .provider-btn:first-child { border-right: 1px solid #30363d; }
  .provider-btn.active-gcp { background: #1a3a1a; color: #3fb950; }
  .provider-btn.active-aws { background: #3d2b07; color: #f0a030; }
  .provider-btn:hover:not(.active-gcp):not(.active-aws) { background: #30363d; }
  .aws-status-bar { background: #21262d; border-radius: 8px; padding: 10px 12px; }
  .aws-status-bar .status-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e; margin-bottom: 8px; }
  .status-meter { height: 6px; background: #30363d; border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
  .status-meter-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .status-counts { display: flex; gap: 12px; font-size: 11px; }
  .status-counts .ready { color: #3fb950; }
  .status-counts .partial { color: #d29922; }
  .status-counts .missing { color: #f85149; }
  .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .preset-btn { background: #30363d; border: 1px solid #444c56; color: #c9d1d9; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 500; text-align: center; transition: all 0.15s; }
  .preset-btn:hover { background: #3d444d; border-color: #58a6ff; }
  .preset-btn.active { background: #1f3a5f; border-color: #58a6ff; color: #58a6ff; }
  .toggle-list { display: flex; flex-direction: column; gap: 4px; }
  .toggle-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; cursor: pointer; font-size: 12px; user-select: none; }
  .toggle-item input { accent-color: #58a6ff; cursor: pointer; }
  .toggle-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .toggle-line { width: 18px; height: 3px; border-radius: 2px; flex-shrink: 0; }
  .comments-list { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; }
  .comment-card { background: #30363d; border-radius: 6px; padding: 8px 10px; position: relative; }
  .comment-target { font-size: 11px; font-weight: 600; color: #58a6ff; margin-bottom: 3px; }
  .comment-file { font-size: 10px; color: #6e7681; font-family: monospace; margin-bottom: 4px; }
  .comment-text { font-size: 12px; color: #c9d1d9; line-height: 1.4; }
  .comment-del { position: absolute; top: 6px; right: 8px; background: none; border: none; color: #6e7681; cursor: pointer; font-size: 14px; line-height: 1; }
  .comment-del:hover { color: #f85149; }
  .empty-comments { font-size: 12px; color: #6e7681; font-style: italic; text-align: center; padding: 8px 0; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: #000000aa; z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #21262d; border: 1px solid #30363d; border-radius: 12px; padding: 20px; width: 400px; max-width: 90vw; }
  .modal h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .modal .modal-file { font-size: 11px; color: #8b949e; font-family: monospace; margin-bottom: 6px; }
  .modal .modal-status { font-size: 11px; margin-bottom: 10px; padding: 4px 8px; border-radius: 4px; display: inline-block; }
  .modal .modal-status.ready { background: #0d2818; color: #3fb950; }
  .modal .modal-status.partial { background: #2d2007; color: #d29922; }
  .modal .modal-status.missing { background: #2d1419; color: #f85149; }
  .modal textarea { width: 100%; height: 80px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; padding: 8px; font-family: inherit; font-size: 13px; resize: vertical; outline: none; }
  .modal textarea:focus { border-color: #58a6ff; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
  .modal-actions button { padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid #30363d; }
  .btn-cancel { background: #21262d; color: #c9d1d9; }
  .btn-cancel:hover { background: #30363d; }
  .btn-save { background: #238636; border-color: #238636; color: #fff; }
  .btn-save:hover { background: #2ea043; }
  .node-group { cursor: pointer; }
  .node-group:hover rect.node-rect { filter: brightness(1.3); }
  .node-group.commented rect.node-rect { stroke-width: 2.5; }
  .conn-label { font-family: 'SF Mono', monospace; font-size: 9px; fill: #8b949e; pointer-events: none; }
  .node-title { font-family: -apple-system, system-ui, sans-serif; font-size: 12px; font-weight: 600; pointer-events: none; }
  .node-subtitle { font-family: 'SF Mono', monospace; font-size: 9px; pointer-events: none; }
  .node-status-badge { font-family: -apple-system, system-ui, sans-serif; font-size: 8px; font-weight: 700; pointer-events: none; letter-spacing: 0.3px; }
</style>
</head>
<body>

<div class="layout">
  <div class="sidebar">
    <h1>E2B Infrastructure</h1>

    <div>
      <h2>Cloud Provider</h2>
      <div class="provider-toggle">
        <button class="provider-btn active-gcp" id="btn-gcp" onclick="setProvider('gcp')">GCP</button>
        <button class="provider-btn" id="btn-aws" onclick="setProvider('aws')">AWS</button>
      </div>
    </div>

    <div class="aws-status-bar" id="awsStatusBar" style="display:none">

      <div class="status-counts">
        <span class="ready" id="awsReady"></span>
        <span class="partial" id="awsPartial"></span>
        <span class="missing" id="awsMissing"></span>
      </div>
    </div>

    <div>
      <h2>View Presets</h2>
      <div class="preset-grid" id="presets"></div>
    </div>

    <div>
      <h2>Layers</h2>
      <div class="toggle-list" id="layerToggles"></div>
    </div>

    <div>
      <h2>Connection Types</h2>
      <div class="toggle-list" id="connToggles"></div>
    </div>

    <div>
      <h2>Comments <span id="commentCount" style="color:#58a6ff"></span></h2>
      <div class="comments-list" id="commentsList">
        <div class="empty-comments">Click a component to add feedback</div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="canvas-wrap">
      <svg id="diagram" viewBox="0 0 1260 880" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="ah-http" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#58a6ff"/></marker>
          <marker id="ah-grpc" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#3fb950"/></marker>
          <marker id="ah-data" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#d29922"/></marker>
          <marker id="ah-storage" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#bc8cff"/></marker>
          <marker id="ah-system" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#f85149"/></marker>
          <marker id="ah-external" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#636e7b"/></marker>
        </defs>
        <g id="diagram-content"></g>
      </svg>
      <div class="zoom-controls">
        <button onclick="changeZoom(-1)">-</button>
        <span id="zoomLevel">100%</span>
        <button onclick="changeZoom(1)">+</button>
        <button onclick="resetZoom()">Reset</button>
      </div>
      <div class="legend" id="legend"></div>
    </div>
    <div class="prompt-area">
      <div class="prompt-header">
        <span>Generated Prompt</span>
        <button class="copy-btn" id="copyBtn" onclick="copyPrompt()">Copy Prompt</button>
      </div>
      <div class="prompt-text" id="promptText">Adjust the view and click components to add architecture feedback.</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <div class="modal-file" id="modalFile"></div>
    <div class="modal-status" id="modalStatus" style="display:none"></div>
    <textarea id="modalText" placeholder="Add your feedback about this component..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveComment()">Save</button>
    </div>
  </div>
</div>

// State
const state = {
  provider: 'gcp',
  layers: { edge: true, api: true, orchestration: true, vm: true, data: true, external: true },
  connectionTypes: { http: true, grpc: true, data: true, storage: true, system: true, external: true },
  activePreset: 'Full System',
  comments: [],
  zoom: 1,
  panX: 0, panY: 0
};

const BASE_VB = { x: 0, y: 0, w: 1260, h: 880 };
let isPanning = false, panStart = { x: 0, y: 0 }, panStartVB = { x: 0, y: 0 };

// --- Provider ---
function setProvider(p) {
  state.provider = p;
  document.getElementById('btn-gcp').className = 'provider-btn' + (p === 'gcp' ? ' active-gcp' : '');
  document.getElementById('btn-aws').className = 'provider-btn' + (p === 'aws' ? ' active-aws' : '');
  document.getElementById('awsStatusBar').style.display = p === 'aws' ? 'block' : 'none';
  if (p === 'aws') updateAwsStatus();
  render();
}

function updateAwsStatus() {
  const visible = nodes.filter(n => state.layers[n.layer] && n.aws);
  const ready = visible.filter(n => n.aws.status === 'ready').length;
  const partial = visible.filter(n => n.aws.status === 'partial').length;
  const missing = visible.filter(n => n.aws.status === 'missing').length;
  const total = visible.length;
  const pct = total > 0 ? Math.round(((ready + partial * 0.5) / total) * 100) : 0;
  document.getElementById('awsMeterFill').style.width = pct + '%';
  const clr = pct > 70 ? '#3fb950' : pct > 40 ? '#d29922' : '#f85149';
  document.getElementById('awsMeterFill').style.background = clr;
  document.getElementById('awsReady').textContent = ready + ' ready';
  document.getElementById('awsPartial').textContent = partial + ' partial';
  document.getElementById('awsMissing').textContent = missing + ' missing';
}

function getNodeDisplay(n) {
  if (state.provider === 'aws' && n.aws) {
    return { label: n.aws.label, subtitle: n.aws.subtitle, status: n.aws.status };
  }
  return { label: n.label, subtitle: n.subtitle, status: null };
}

function getConnLabel(c) {
  return state.provider === 'aws' ? (c.awsLabel || c.label) : c.label;
}

// --- Rendering ---
function render() {
  const g = document.getElementById('diagram-content');
  g.innerHTML = '';

  if (state.provider === 'aws') updateAwsStatus();

  // Layer bands
  const layerBands = [
    { layer: 'edge',          y: 15, h: 78,  label: 'Edge' },
    { layer: 'api',           y: 135, h: 82,  label: 'API' },
    { layer: 'orchestration', y: 270, h: 165, label: 'Orchestration' },
    { layer: 'vm',            y: 460, h: 82,  label: 'VM' },
    { layer: 'data',          y: 580, h: 82,  label: 'Data' },
  ];
  layerBands.forEach(b => {
    if (!state.layers[b.layer]) return;
    const rect = svgEl('rect', { x: 8, y: b.y, width: 1000, height: b.h, rx: 8, fill: LAYERS[b.layer].fill, opacity: 0.35 });
    g.appendChild(rect);
    const txt = svgEl('text', { x: 16, y: b.y + 14, fill: LAYERS[b.layer].color, opacity: 0.4, 'font-size': '10px', 'font-weight': '600', 'font-family': '-apple-system, system-ui, sans-serif' });
    txt.textContent = b.label;
    g.appendChild(txt);
  });

  // Connections
  connections.forEach(c => {
    if (!isConnVisible(c)) return;
    const from = nodesById[c.from], to = nodesById[c.to];
    const ct = CONN_TYPES[c.type];
    const path = calcPath(from, to);
    const el = svgEl('path', { d: path, stroke: ct.color, 'stroke-width': 1.5, fill: 'none', 'stroke-dasharray': ct.dash, 'marker-end': `url(#ah-${c.type})`, opacity: 0.65 });
    g.appendChild(el);
    const lbl = getConnLabel(c);
    if (lbl) {
      const mid = pathMidpoint(from, to);
      const bg = svgEl('rect', { x: mid.x - 2, y: mid.y - 9, width: lbl.length * 5.5 + 6, height: 13, rx: 3, fill: '#0d1117', opacity: 0.85 });
      g.appendChild(bg);
      const t = svgEl('text', { x: mid.x + 1, y: mid.y, class: 'conn-label', fill: ct.color, opacity: 0.8 });
      t.textContent = lbl;
      g.appendChild(t);
    }
  });

  // Nodes
  nodes.forEach(n => {
    if (!state.layers[n.layer]) return;
    const ly = LAYERS[n.layer];
    const d = getNodeDisplay(n);
    const hasComment = state.comments.some(c => c.target === n.id);
    const isAws = state.provider === 'aws';
    const grp = svgEl('g', { class: 'node-group' + (hasComment ? ' commented' : ''), 'data-id': n.id });

    // Determine border style for AWS status
    let strokeDash = '';
    let strokeOpacity = 1;
    let fillOpacity = 1;
    if (isAws && d.status === 'missing') { strokeDash = '4,3'; fillOpacity = 0.5; }
    else if (isAws && d.status === 'partial') { strokeDash = '8,3'; fillOpacity = 0.75; }

    const rect = svgEl('rect', {
      x: n.x, y: n.y, width: n.w, height: n.h, rx: 8,
      fill: ly.fill, stroke: isAws && d.status ? (AWS_STATUS[d.status]?.color || ly.color) : ly.color,
      'stroke-width': hasComment ? 2.5 : 1.2,
      'stroke-dasharray': strokeDash,
      opacity: fillOpacity,
      class: 'node-rect'
    });
    grp.appendChild(rect);

    // Comment badge
    if (hasComment) {
      const badge = svgEl('circle', { cx: n.x + n.w - 6, cy: n.y + 6, r: 5, fill: '#58a6ff' });
      grp.appendChild(badge);
    }

    // AWS status badge
    if (isAws && d.status) {
      const st = AWS_STATUS[d.status];
      const badgeW = d.status === 'missing' ? 42 : d.status === 'partial' ? 40 : 34;
      const bx = n.x + n.w - badgeW - 6;
      const by = n.y + n.h - 14;
      const br = svgEl('rect', { x: bx, y: by, width: badgeW, height: 12, rx: 3, fill: st.bg, stroke: st.color, 'stroke-width': 0.5 });
      grp.appendChild(br);
      const bt = svgEl('text', { x: bx + badgeW / 2, y: by + 9, 'text-anchor': 'middle', class: 'node-status-badge', fill: st.color });
      bt.textContent = st.label.toUpperCase();
      grp.appendChild(bt);
    }

    const title = svgEl('text', { x: n.x + 10, y: n.y + (n.h > 50 ? 22 : 20), class: 'node-title', fill: isAws && d.status ? (AWS_STATUS[d.status]?.color || ly.textColor) : ly.textColor });
    title.textContent = d.label;
    grp.appendChild(title);

    const sub = svgEl('text', { x: n.x + 10, y: n.y + (n.h > 50 ? 38 : 34), class: 'node-subtitle', fill: '#8b949e' });
    sub.textContent = d.subtitle;
    grp.appendChild(sub);

    grp.addEventListener('click', (e) => { e.stopPropagation(); openModal(n); });
    g.appendChild(grp);
  });

  updatePrompt();
}

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function isConnVisible(c) {
  const from = nodesById[c.from], to = nodesById[c.to];
  return state.layers[from.layer] && state.layers[to.layer] && state.connectionTypes[c.type];
}

function calcPath(from, to) {
  const fcx = from.x + from.w / 2, fcy = from.y + from.h / 2;
  const tcx = to.x + to.w / 2, tcy = to.y + to.h / 2;
  const dx = tcx - fcx, dy = tcy - fcy;
  let x1, y1, x2, y2;
  if (Math.abs(dy) > Math.abs(dx) * 0.4) {
    if (dy > 0) { x1 = fcx; y1 = from.y + from.h; x2 = tcx; y2 = to.y; }
    else { x1 = fcx; y1 = from.y; x2 = tcx; y2 = to.y + to.h; }
    const my = (y1 + y2) / 2;
    return `M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`;
  } else {
    if (dx > 0) { x1 = from.x + from.w; y1 = fcy; x2 = to.x; y2 = tcy; }
    else { x1 = from.x; y1 = fcy; x2 = to.x + to.w; y2 = tcy; }
    const mx = (x1 + x2) / 2;
    return `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;
  }
}

function pathMidpoint(from, to) {
  const fcx = from.x + from.w / 2, fcy = from.y + from.h / 2;
  const tcx = to.x + to.w / 2, tcy = to.y + to.h / 2;
  const dx = tcx - fcx, dy = tcy - fcy;
  if (Math.abs(dy) > Math.abs(dx) * 0.4) {
    const y1 = dy > 0 ? from.y + from.h : from.y;
    const y2 = dy > 0 ? to.y : to.y + to.h;
    return { x: (fcx + tcx) / 2, y: (y1 + y2) / 2 };
  }
  const x1 = dx > 0 ? from.x + from.w : from.x;
  const x2 = dx > 0 ? to.x : to.x + to.w;
  return { x: (x1 + x2) / 2, y: (fcy + tcy) / 2 };
}

// --- Zoom & Pan ---
function changeZoom(dir) {
  state.zoom = Math.max(0.35, Math.min(3, state.zoom + dir * 0.2));
  applyViewBox();
}

function resetZoom() {
  state.zoom = 1; state.panX = 0; state.panY = 0;
  applyViewBox();
}

function applyViewBox() {
  const w = BASE_VB.w / state.zoom, h = BASE_VB.h / state.zoom;
  const cx = BASE_VB.w / 2 + state.panX, cy = BASE_VB.h / 2 + state.panY;
  document.getElementById('diagram').setAttribute('viewBox', `${cx - w/2} ${cy - h/2} ${w} ${h}`);
  document.getElementById('zoomLevel').textContent = Math.round(state.zoom * 100) + '%';
}

const svg = document.getElementById('diagram');
svg.addEventListener('mousedown', e => {
  if (e.target.closest('.node-group')) return;
  isPanning = true;
  panStart = { x: e.clientX, y: e.clientY };
  panStartVB = { x: state.panX, y: state.panY };
});
svg.addEventListener('mousemove', e => {
  if (!isPanning) return;
  state.panX = panStartVB.x - (e.clientX - panStart.x) / state.zoom;
  state.panY = panStartVB.y - (e.clientY - panStart.y) / state.zoom;
  applyViewBox();
});
document.addEventListener('mouseup', () => { isPanning = false; });
svg.addEventListener('wheel', e => {
  e.preventDefault();
  state.zoom = Math.max(0.35, Math.min(3, state.zoom + (e.deltaY < 0 ? 0.1 : -0.1)));
  applyViewBox();
}, { passive: false });

// --- Comment Modal ---
let modalNode = null;

function openModal(node) {
  modalNode = node;
  const d = getNodeDisplay(node);
  document.getElementById('modalTitle').textContent = d.label;
  document.getElementById('modalFile').textContent = d.subtitle;
  const statusEl = document.getElementById('modalStatus');
  if (state.provider === 'aws' && d.status) {
    const st = AWS_STATUS[d.status];
    statusEl.textContent = st.label + ': ' + st.desc;
    statusEl.className = 'modal-status ' + d.status;
    statusEl.style.display = 'inline-block';
  } else {
    statusEl.style.display = 'none';
  }
  document.getElementById('modalText').value = '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('modalText').focus(), 50);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  modalNode = null;
}

function saveComment() {
  const text = document.getElementById('modalText').value.trim();
  if (!text || !modalNode) return;
  const d = getNodeDisplay(modalNode);
  state.comments.push({
    id: Date.now(), target: modalNode.id,
    targetLabel: d.label, targetFile: d.subtitle,
    provider: state.provider,
    awsStatus: d.status,
    text
  });
  closeModal();
  renderComments();
  render();
}

document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); if (e.key === 'Enter' && e.metaKey) saveComment(); });

function renderComments() {
  const el = document.getElementById('commentsList');
  const cnt = document.getElementById('commentCount');
  if (!state.comments.length) {
    el.innerHTML = '<div class="empty-comments">Click a component to add feedback</div>';
    cnt.textContent = '';
    return;
  }
  cnt.textContent = `(${state.comments.length})`;
  el.innerHTML = state.comments.map(c => {
    const provTag = c.provider === 'aws' && c.awsStatus ? ` <span style="color:${AWS_STATUS[c.awsStatus].color};font-size:10px">[${c.awsStatus}]</span>` : '';
    return `
    <div class="comment-card">
      <button class="comment-del" onclick="deleteComment(${c.id})">&times;</button>
      <div class="comment-target">${escHtml(c.targetLabel)}${provTag}</div>
      <div class="comment-file">${escHtml(c.targetFile)}</div>
      <div class="comment-text">${escHtml(c.text)}</div>
    </div>`;
  }).join('');
}

function deleteComment(id) {
  state.comments = state.comments.filter(c => c.id !== id);
  renderComments();
  render();
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// --- Controls ---
function buildControls() {
  const pg = document.getElementById('presets');
  Object.keys(PRESETS).forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (name === state.activePreset ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => applyPreset(name);
    pg.appendChild(btn);
  });

  const lt = document.getElementById('layerToggles');
  Object.entries(LAYERS).forEach(([key, ly]) => {
    const label = document.createElement('label');
    label.className = 'toggle-item';
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.checked = state.layers[key];
    cb.onchange = () => { state.layers[key] = cb.checked; syncPreset(); render(); };
    const dot = document.createElement('span');
    dot.className = 'toggle-dot'; dot.style.background = ly.color;
    label.appendChild(cb); label.appendChild(dot);
    label.appendChild(document.createTextNode(ly.label));
    lt.appendChild(label);
  });

  const ct = document.getElementById('connToggles');
  Object.entries(CONN_TYPES).forEach(([key, ct_]) => {
    const label = document.createElement('label');
    label.className = 'toggle-item';
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.checked = state.connectionTypes[key];
    cb.onchange = () => { state.connectionTypes[key] = cb.checked; syncPreset(); render(); };
    const line = document.createElement('span');
    line.className = 'toggle-line'; line.style.background = ct_.color;
    if (ct_.dash) { line.style.background = `repeating-linear-gradient(90deg, ${ct_.color} 0 3px, transparent 3px 5px)`; }
    label.appendChild(cb); label.appendChild(line);
    label.appendChild(document.createTextNode(ct_.label));
    ct.appendChild(label);
  });

  // Legend
  const leg = document.getElementById('legend');
  Object.entries(CONN_TYPES).forEach(([key, ct_]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    const line = document.createElement('span');
    line.className = 'legend-line'; line.style.background = ct_.color;
    if (ct_.dash) { line.style.background = `repeating-linear-gradient(90deg, ${ct_.color} 0 3px, transparent 3px 5px)`; }
    item.appendChild(line);
    item.appendChild(document.createTextNode(ct_.label));
    leg.appendChild(item);
  });
  // AWS status legend items (shown dynamically)
  const sep = document.createElement('span');
  sep.id = 'legendAwsSep'; sep.style.display = 'none';
  sep.style.cssText = 'width:1px;height:14px;background:#30363d;display:none';
  leg.appendChild(sep);
  Object.entries(AWS_STATUS).forEach(([key, st]) => {
    const item = document.createElement('div');
    item.className = 'legend-item aws-legend-item';
    item.style.display = 'none';
    const dot = document.createElement('span');
    dot.className = 'legend-dot'; dot.style.background = st.color;
    item.appendChild(dot);
    item.appendChild(document.createTextNode('AWS ' + st.label));
    leg.appendChild(item);
  });
}

function applyPreset(name) {
  const p = PRESETS[name];
  state.activePreset = name;
  Object.assign(state.layers, p.layers);
  Object.assign(state.connectionTypes, p.conns);
  document.querySelectorAll('#layerToggles input').forEach((cb, i) => { cb.checked = Object.values(p.layers)[i]; });
  document.querySelectorAll('#connToggles input').forEach((cb, i) => { cb.checked = Object.values(p.conns)[i]; });
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', b.textContent === name));
  render();
}

function syncPreset() {
  let matched = null;
  for (const [name, p] of Object.entries(PRESETS)) {
    const layersMatch = Object.entries(p.layers).every(([k, v]) => state.layers[k] === v);
    const connsMatch = Object.entries(p.conns).every(([k, v]) => state.connectionTypes[k] === v);
    if (layersMatch && connsMatch) { matched = name; break; }
  }
  state.activePreset = matched;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', b.textContent === matched));
}

// Toggle AWS legend items
const origSetProvider = setProvider;
setProvider = function(p) {
  origSetProvider(p);
  const show = p === 'aws';
  document.querySelectorAll('.aws-legend-item').forEach(el => el.style.display = show ? 'flex' : 'none');
  const sep = document.getElementById('legendAwsSep');
  if (sep) sep.style.display = show ? 'block' : 'none';
};

// --- Prompt ---
function updatePrompt() {
  const parts = [];
  const isAws = state.provider === 'aws';
  const providerName = isAws ? 'AWS' : 'GCP';
  const visibleLayers = Object.entries(state.layers).filter(([_, v]) => v).map(([k]) => LAYERS[k].label);
  const allVisible = visibleLayers.length === Object.keys(LAYERS).length;

  if (state.activePreset && state.activePreset !== 'Full System') {
    parts.push(`Viewing the E2B infrastructure architecture on ${providerName} with the "${state.activePreset}" preset (${visibleLayers.join(', ')} layers).`);
  } else if (!allVisible) {
    parts.push(`Viewing the E2B infrastructure on ${providerName}, focusing on: ${visibleLayers.join(', ')}.`);
  } else {
    parts.push(`Viewing the full E2B infrastructure architecture on ${providerName}.`);
  }

  if (isAws) {
    const visible = nodes.filter(n => state.layers[n.layer] && n.aws);
    const ready = visible.filter(n => n.aws.status === 'ready').length;
    const partial = visible.filter(n => n.aws.status === 'partial').length;
    const missing = visible.filter(n => n.aws.status === 'missing').length;
    parts.push('');
    parts.push(`AWS readiness: ${ready} components ready, ${partial} partially ready (Go code done, Terraform missing), ${missing} not yet implemented.`);

    if (missing > 0) {
      const missingNodes = visible.filter(n => n.aws.status === 'missing');
      parts.push(`Missing infrastructure: ${missingNodes.map(n => n.aws.label).join(', ')}.`);
    }
    if (partial > 0) {
      const partialNodes = visible.filter(n => n.aws.status === 'partial');
      parts.push(`Needs Terraform: ${partialNodes.map(n => n.aws.label).join(', ')}.`);
    }
  }

  if (state.comments.length > 0) {
    parts.push('');
    parts.push('Feedback on specific components:');
    state.comments.forEach(c => {
      parts.push('');
      const statusNote = c.awsStatus && c.provider === 'aws' ? ` [AWS: ${c.awsStatus}]` : '';
      parts.push(`**${c.targetLabel}**${statusNote} (${c.targetFile}):`);
      parts.push(c.text);
    });
  }

  document.getElementById('promptText').textContent = parts.join('\n');
}

function copyPrompt() {
  navigator.clipboard.writeText(document.getElementById('promptText').textContent).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy Prompt'; btn.classList.remove('copied'); }, 1500);
  });
}

// --- Init ---
buildControls();
render();
</script>
</body>
