receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: nomad-servers
          metrics_path: /v1/metrics
          params:
            format: [prometheus]
          scrape_interval: 15s

          consul_sd_configs:
            - server: consul.service.consul:8500
              services: ["nomad"]   # your Consul service name for servers

          relabel_configs:
            # Prefer the service address if present; force Nomad HTTP port
            - source_labels: [__meta_consul_service_address]
              regex: (.+)
              target_label: __address__
              replacement: $1:4646

processors:
  filter/nomad_metrics:
    metrics:
      include:
        match_type: regexp
        metric_names:
          # Runtime
          - nomad_runtime_alloc_bytes
          - nomad_runtime_heap_objects
          - nomad_runtime_num_goroutines

          # Broker gauges
          - nomad_nomad_broker_total_pending
          - nomad_nomad_broker_total_ready
          - nomad_nomad_broker_total_unacked

          # Heartbeat
          - nomad_nomad_heartbeat_active

          # Plan / scheduler
          - nomad_nomad_plan_evaluate.*
          - nomad_nomad_plan_node_rejected
          - nomad_nomad_plan_queue_depth
          - nomad_nomad_plan_submit.*

          # RPC
          - nomad_nomad_rpc_query
          - nomad_nomad_rpc_request

          # Gossip
          - nomad_memberlist_gossip

          # Raft
          - nomad_raft_leader_lastContact
          - nomad_raft_state_candidate.*
          - nomad_raft_state_leader.*
          - nomad_raft_appliedIndex
          - nomad_raft_fsm_apply
          - nomad_raft_leader_dispatchLog.*
          - nomad_raft_leader_dispatchNumLogs
  batch:
    timeout: 5s

%{ if provider_name == "gcp" && enable_gcp_telemetry_metrics }
  batch/gcp_telemetry:
    timeout: 5s
    send_batch_size: 200
    send_batch_max_size: 200

  metricstarttime/gcp_telemetry:
    strategy: subtract_initial_point
%{ endif }

  resourcedetection:
    # https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/processor/resourcedetectionprocessor
%{ if provider_name == "gcp" }
    detectors: [gcp]
    override: true
    gcp:
      resource_attributes:
        cloud.provider:
          enabled: false
        cloud.platform:
          enabled: false
        cloud.account.id:
          enabled: true
        cloud.availability_zone:
          enabled: false
        cloud.region:
          enabled: false
        host.type:
          enabled: false
        host.id:
          enabled: false
        host.name:
          enabled: true
        gcp.gce.instance.name:
          enabled: false
        gcp.gce.instance_group_manager.region:
          enabled: false
        gcp.gce.instance_group_manager.zone:
          enabled: false
        gcp.gce.instance_group_manager.name:
          enabled: false
%{ endif }
%{ if provider_name == "aws" }
    detectors: [ec2]
    override: true
    ec2:
      resource_attributes:
        cloud.provider:
          enabled: false
        cloud.platform:
          enabled: false
        cloud.account.id:
          enabled: true
        cloud.region:
          enabled: false
        cloud.availability_zone:
          enabled: false
        host.id:
          enabled: false
        host.name:
          enabled: true
%{ endif }

%{ if provider_name == "gcp" && enable_gcp_telemetry_metrics }
  resourcedetection/gcp_telemetry:
    detectors: [gcp]
    override: true
    gcp:
      resource_attributes:
        cloud.account.id:
          enabled: true
        cloud.availability_zone:
          enabled: true
        cloud.platform:
          enabled: true
        cloud.provider:
          enabled: true
        host.id:
          enabled: true
        host.name:
          enabled: true
%{ endif }

%{ if provider_name == "gcp" && enable_gcp_telemetry_metrics }
  transform/gcp_managed_prometheus_labels:
    metric_statements:
      - context: datapoint
        statements:
          - set(attributes["exported_location"], attributes["location"]) where attributes["location"] != nil
          - delete_key(attributes, "location")
          - set(attributes["exported_cluster"], attributes["cluster"]) where attributes["cluster"] != nil
          - delete_key(attributes, "cluster")
          - set(attributes["exported_namespace"], attributes["namespace"]) where attributes["namespace"] != nil
          - delete_key(attributes, "namespace")
          - set(attributes["exported_job"], attributes["job"]) where attributes["job"] != nil
          - delete_key(attributes, "job")
          - set(attributes["exported_instance"], attributes["instance"]) where attributes["instance"] != nil
          - delete_key(attributes, "instance")
          - set(attributes["exported_project_id"], attributes["project_id"]) where attributes["project_id"] != nil
          - delete_key(attributes, "project_id")

  transform/gcp_prometheus_target_resource:
    metric_statements:
      - context: resource
        statements:
          - set(attributes["service.name"], "nomad-servers")
%{ endif }

  transform/set-name:
    metric_statements:
      # We don't want to set host name here as we want to report the nomad server, not the otel collector's host
      # - set(datapoint.attributes["service.instance.id"], resource.attributes["host.name"])
      - set(datapoint.attributes["deployment.environment"], resource.attributes["cloud.account.id"])
      - delete_key(resource.attributes, "service.name")

extensions:
  basicauth/grafana_cloud:
    # https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/extension/basicauthextension
    client_auth:
      username: "${grafana_username}"
      password: "${grafana_otel_collector_token}"

  health_check:
    endpoint: 0.0.0.0:13134
exporters:
  otlp_http/grafana_cloud:
    # https://github.com/open-telemetry/opentelemetry-collector/tree/main/exporter/otlpexporter
    endpoint: "${grafana_otlp_url}/otlp"
    auth:
      authenticator: basicauth/grafana_cloud
%{ if provider_name == "gcp" && enable_gcp_telemetry_metrics }
  googlemanagedprometheus/gcp_telemetry:
    project: ${gcp_telemetry_project_id}
%{ endif }
service:
  telemetry:
    metrics:
      level: none
  extensions:
    - basicauth/grafana_cloud
    - health_check
  pipelines:
    metrics/prometheus:
      receivers:
        - prometheus
      processors:
        - filter/nomad_metrics
        - resourcedetection
        - transform/set-name
        - batch
      exporters:
        - otlp_http/grafana_cloud
%{ if provider_name == "gcp" && enable_gcp_telemetry_metrics }
    metrics/gcp_telemetry/prometheus:
      receivers:
        - prometheus
      processors:
        - filter/nomad_metrics
        - resourcedetection/gcp_telemetry
        - transform/gcp_managed_prometheus_labels
        - transform/set-name
        - transform/gcp_prometheus_target_resource
        - metricstarttime/gcp_telemetry
        - batch/gcp_telemetry
      exporters:
        - googlemanagedprometheus/gcp_telemetry
%{ endif }
