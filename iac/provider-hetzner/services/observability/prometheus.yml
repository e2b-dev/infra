global:
  scrape_interval: 15s
  external_labels: { cluster: maxicore-fsn1 }
remote_write:
  - url: http://mimir:9009/api/v1/push
    headers: { X-Scope-OrgID: maxicore }
scrape_configs:
  - job_name: orchestrator
    static_configs: [{ targets: ['orchestrator.service.consul:2113'] }]
  - job_name: apisix
    static_configs: [{ targets: ['apisix:9091'] }]
  - job_name: otel-collector
    static_configs: [{ targets: ['otel-collector:8888'] }]
  - job_name: nomad
    metrics_path: /v1/metrics
    static_configs: [{ targets: ['nomad.service.consul:4646'] }]
