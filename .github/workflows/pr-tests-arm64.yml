name: ARM64 tests on PRs

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        description: "Codecov upload token; absent on fork PRs (upload step is skipped)."
        required: false
      TRUNK_API_TOKEN:
        description: "Trunk Flaky Tests upload token; absent on fork PRs (upload step is skipped)."
        required: false

permissions:
  contents: read

jobs:
  cross-compile:
    name: Cross-compile all packages for ARM64
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Go
        uses: ./.github/actions/go-setup-cache

      - name: Install ARM64 cross-compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build and vet packages (pure Go)
        run: |
          for pkg in api client-proxy envd shared db docker-reverse-proxy; do
            echo "::group::packages/$pkg"
            pushd "packages/$pkg" > /dev/null
            GOARCH=arm64 go build ./...
            GOARCH=arm64 go vet ./...
            popd > /dev/null
            echo "::endgroup::"
          done

      - name: Build and vet orchestrator (CGO)
        run: |
          CGO_ENABLED=1 CC=aarch64-linux-gnu-gcc GOARCH=arm64 go build ./...
          CGO_ENABLED=1 CC=aarch64-linux-gnu-gcc GOARCH=arm64 go vet ./...
        working-directory: packages/orchestrator

  arm64-unit-tests:
    name: ARM64 tests for ${{ matrix.package }}
    runs-on: infra-runner-arm
    timeout-minutes: 45
    env:
      GIN_MODE: test
      # Parallel `go test ./...` binaries derive the same Ryuk session id
      # and race on `reaper_<hash>` creation. Disable Ryuk; t.Cleanup
      # handles normal exit, the prune step below handles abnormal exit.
      TESTCONTAINERS_RYUK_DISABLED: "true"
      # Surfaced as env so the upload steps can gate on their presence
      # (fork PRs never receive secrets).
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
    strategy:
      matrix:
        include:
          - package: packages/api
            flag: arm64-api
            test_path: ./...
            sudo: false
          - package: packages/client-proxy
            flag: arm64-client-proxy
            test_path: ./...
            sudo: false
          - package: packages/db
            flag: arm64-db
            test_path: ./...
            sudo: false
          - package: packages/docker-reverse-proxy
            flag: arm64-docker-reverse-proxy
            test_path: ./...
            sudo: false
          - package: packages/envd
            flag: arm64-envd
            test_path: ./...
            sudo: true
          - package: packages/orchestrator
            flag: arm64-orchestrator
            test_path: ./...
            sudo: true
          - package: packages/shared
            flag: arm64-shared
            test_path: ./pkg/...
            sudo: false
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Go
        uses: ./.github/actions/go-setup-cache
        with:
          cache-dependency-paths: |
            go.work
            ${{ matrix.package }}/go.mod
            ${{ matrix.package }}/go.sum

      - name: Reap orphaned Testcontainers from previous runs
        # Persistent runner + Ryuk disabled: prune leftover containers
        # from SIGKILL/timeout/OOM in prior jobs.
        # Two `docker ps` calls because different filter keys AND inside
        # one call. Don't anchor `name=^reaper_` — Docker silently drops
        # anchored patterns (docker/cli#1201).
        run: |
          set -euo pipefail
          ids=$(
            {
              docker ps -aq --filter "label=org.testcontainers=true"
              docker ps -aq --filter "name=reaper_"
            } | sort -u
          )
          if [ -n "${ids}" ]; then
            # shellcheck disable=SC2086
            docker rm -f ${ids}
          fi

      - name: Setup envd tests
        run: |
          sudo apt-get update && sudo apt-get install -y bindfs
        if: matrix.package == 'packages/envd'

      - name: Setup orchestrator tests
        run: |
          make -C packages/orchestrator fetch-busybox BUILD_ARCH=arm64
          echo "HOST_BUSYBOX_DIR=$(pwd)/packages/orchestrator/.busybox" >> "$GITHUB_ENV"

          # Enable unprivileged uffd (Ubuntu defaults to 0)
          echo 1 | sudo tee /proc/sys/vm/unprivileged_userfaultfd

          # Enable hugepages (256 × 2MB = 512MB).
          # Tests that need more hugepages than available will skip gracefully.
          sudo mkdir -p /mnt/hugepages
          sudo mount -t hugetlbfs none /mnt/hugepages
          echo 256 | sudo tee /proc/sys/vm/nr_hugepages

          # Install extra kernel modules (nbd is not in base modules on GitHub-hosted runners)
          sudo apt-get update
          sudo apt-get install -y linux-modules-extra-$(uname -r)
          sudo modprobe nbd nbds_max=256

          # Disable inotify watching of change events for NBD devices
          echo 'ACTION=="add|change", KERNEL=="nbd*", OPTIONS:="nowatch"' | sudo tee /etc/udev/rules.d/97-nbd-device.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger
        if: matrix.package == 'packages/orchestrator'

      - name: Install gotestsum
        # Wraps `go test` to emit JUnit XML for Trunk while passing through
        # -coverprofile to go test for Codecov.
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Compile test binaries
        working-directory: ${{ matrix.package }}
        run: sudo -E `which go` test -run '^$' ${{ matrix.test_path }}
        if: matrix.sudo == true

      - name: Run tests that require sudo
        working-directory: ${{ matrix.package }}
        # `sudo` strips PATH via secure_path, so we pass it explicitly via `env`
        # to make the runner-installed go (1.25.9) and gotestsum visible to the
        # root shell. `-E` keeps the rest of the env (HOST_BUSYBOX_DIR, GIN_MODE,
        # etc). The trap hands the root-written reports back to the runner user
        # even if tests fail, so the upload steps can still read them.
        run: |
          trap 'sudo chown "$(id -u):$(id -g)" coverage.txt junit.xml 2>/dev/null || true' EXIT
          sudo -E env "PATH=$PATH" gotestsum --junitfile=junit.xml --format=standard-verbose \
            -- -timeout 20m -coverprofile=coverage.txt -covermode=atomic ${{ matrix.test_path }}
        if: matrix.sudo == true

      - name: Compile test binaries
        working-directory: ${{ matrix.package }}
        run: go test -run '^$' ${{ matrix.test_path }}
        if: matrix.sudo == false

      - name: Run tests
        working-directory: ${{ matrix.package }}
        run: |
          gotestsum --junitfile=junit.xml --format=standard-verbose \
            -- -timeout 20m -coverprofile=coverage.txt -covermode=atomic ${{ matrix.test_path }}
        if: matrix.sudo == false

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() && env.CODECOV_TOKEN != '' && hashFiles(format('{0}/coverage.txt', matrix.package)) != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ matrix.package }}/coverage.txt
          flags: ${{ matrix.flag }}
          disable_search: true

      - name: Upload test results to Trunk
        if: ${{ !cancelled() && env.TRUNK_API_TOKEN != '' && hashFiles(format('{0}/junit.xml', matrix.package)) != '' }}
        # Don't fail the job if the analytics upload itself errors out.
        continue-on-error: true
        uses: trunk-io/analytics-uploader@v2
        with:
          junit-paths: ${{ matrix.package }}/junit.xml
          org-slug: e2b
          token: ${{ secrets.TRUNK_API_TOKEN }}
          # Variant keeps x86_64 and arm64 runs of the same test distinguishable in Trunk.
          variant: unit-arm64
