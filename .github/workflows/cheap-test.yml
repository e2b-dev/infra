name: Periodic Tests

on:
  schedule:
    # every hour on hour 38
    # 38 to avoid peak traffic
    - cron: '38 * * * *'
  workflow_dispatch:
  # only run on changes to cheap-test dir 
  push:
    paths:
      - 'cheap-test/**'
      - '.github/workflows/cheap-test.yml'



concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  changes:
    name: Repository changes
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        test-command:
          - command: "cheap-test/run-code.ts"
            name: "Run Code Tests"
          - command: "cheap-test/create-file.ts"
            name: "create file"
          - command: "cheap-test/build-template/index.ts"
            name: "build and delete template"
            dir: "cheap-test/build-template/"
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install deno
        uses: denoland/setup-deno@v1

      - name: ${{ matrix.test-command.name }}
        run: deno run --allow-all ${{ matrix.test-command.command }}
        working-directory: ${{ matrix.test-command.dir }}
        env:
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}


