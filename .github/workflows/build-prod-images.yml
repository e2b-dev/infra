name: Build prod images

on:
  workflow_dispatch:
    inputs:
      api:
        description: "Build api image"
        required: false
        type: boolean
        default: true
      client_proxy:
        description: "Build client-proxy image"
        required: false
        type: boolean
        default: true
      dashboard_api:
        description: "Build dashboard-api image"
        required: false
        type: boolean
        default: true
      docker_reverse_proxy:
        description: "Build docker-reverse-proxy image"
        required: false
        type: boolean
        default: true
      clean_nfs_cache:
        description: "Build clean-nfs-cache image"
        required: false
        type: boolean
        default: true
      orchestrator:
        description: "Build orchestrator image"
        required: false
        type: boolean
        default: true
      template_manager:
        description: "Build template-manager image"
        required: false
        type: boolean
        default: true
      envd:
        description: "Build envd image"
        required: false
        type: boolean
        default: true
      clickhouse_migrator:
        description: "Build clickhouse-migrator image"
        required: false
        type: boolean
        default: true
      nomad_nodepool_apm:
        description: "Build nomad-nodepool-apm image"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare image builds
    runs-on: ubuntu-24.04
    outputs:
      image_names: ${{ steps.images.outputs.image_names }}
    steps:
      - name: Build image list
        id: images
        run: |
          images=()

          if [[ "${{ inputs.api }}" == "true" ]]; then images+=("api"); fi
          if [[ "${{ inputs.client_proxy }}" == "true" ]]; then images+=("client-proxy"); fi
          if [[ "${{ inputs.dashboard_api }}" == "true" ]]; then images+=("dashboard-api"); fi
          if [[ "${{ inputs.docker_reverse_proxy }}" == "true" ]]; then images+=("docker-reverse-proxy"); fi
          if [[ "${{ inputs.clean_nfs_cache }}" == "true" ]]; then images+=("clean-nfs-cache"); fi
          if [[ "${{ inputs.orchestrator }}" == "true" ]]; then images+=("orchestrator"); fi
          if [[ "${{ inputs.template_manager }}" == "true" ]]; then images+=("template-manager"); fi
          if [[ "${{ inputs.envd }}" == "true" ]]; then images+=("envd"); fi
          if [[ "${{ inputs.clickhouse_migrator }}" == "true" ]]; then images+=("clickhouse-migrator"); fi
          if [[ "${{ inputs.nomad_nodepool_apm }}" == "true" ]]; then images+=("nomad-nodepool-apm"); fi

          if [[ "${#images[@]}" == "0" ]]; then
            echo "::error::At least one image must be selected"
            exit 1
          fi

          image_names="$(IFS=';'; echo "${images[*]}")"
          echo "image_names=$image_names" >> "$GITHUB_OUTPUT"

  build-images:
    needs: prepare
    name: Build images
    uses: ./.github/workflows/build-and-upload-image.yml
    with:
      commit_sha: ${{ github.sha }}
      environment: prod
      image_names: ${{ needs.prepare.outputs.image_names }}
