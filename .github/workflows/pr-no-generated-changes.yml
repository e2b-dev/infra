name: Ensure generated files are up-to-date

on:
  workflow_call:
    inputs:
      run-check:
        type: boolean
        description: 'Whether to run generated-code validation'
        required: false
        default: true
      commit:
        type: boolean
        description: 'Whether to commit and push changes automatically'
        required: true
    secrets:
      app_id:
        description: 'GitHub App ID for pushing commits that trigger workflows'
        required: false
      app_secret:
        description: 'GitHub PAT for pushing commits that trigger workflows'
        required: false

permissions:
  contents: read

jobs:
  run-check:
    if: ${{ inputs.run-check == true }}
    runs-on: ubuntu-24.04
    steps:
      - name: Generate GitHub App installation token
        id: app-token
        if: ${{ inputs.commit == true }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_secret }}

      - name: Checkout repository
        uses: actions/checkout@v6
        if: ${{ inputs.commit == true }}
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Checkout repository
        uses: actions/checkout@v6
        if: ${{ inputs.commit == false }}

      - name: Parse .tool-versions
        uses: wistia/parse-tool-versions@v2.1.1

      - name: Setup Go
        uses: ./.github/actions/go-setup-cache

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "${{ env.TERRAFORM }}"

      - name: Run integrity check
        run: make tidy

      - name: Fix meters and tracers
        run: |
          ./scripts/fix-tracers.sh
          ./scripts/fix-meters.sh

      - uses: jdx/mise-action@v4

      - name: Generate all code
        run: make generate  # cannot do this in parallel, as there are some race conditions

      - name: Format code
        run: make fmt

      - name: Commit generated changes if any
        # head_ref is attacker-controlled (PR branch name); pass via env to avoid
        # shell injection in the inline script.
        env:
          HEAD_REF: ${{ github.head_ref }}
          COMMIT: ${{ inputs.commit }}
        run: |
          if [[ -z $(git status --porcelain) ]]; then
            echo "✅ No changes detected."
            exit 0
          fi

          if [[ "$COMMIT" != "true" ]]; then
            echo "❌ Generated files are not up to date. Please run 'make generate' and commit the changes."
            git status --short
            exit 1
          fi

          echo "📝 Generated files are not up to date. Committing changes..."
          git status --short

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "chore: auto-commit generated changes"
          git push origin "HEAD:$HEAD_REF"

          echo "✅ Changes committed and pushed successfully."

          # There were changes, exit with an error code so that the workflow fails.
          exit 1

  generated_code_check:
    needs: run-check
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Aggregate generated-code result
        run: |
          if [[ "${{ inputs.run-check }}" != "true" ]]; then
            echo "generated-code check skipped because generated-code inputs did not change"
            exit 0
          fi

          if [[ "${{ needs.run-check.result }}" != "success" ]]; then
            echo "generated-code check result: ${{ needs.run-check.result }}"
            exit 1
          fi

          echo "generated-code check succeeded"
