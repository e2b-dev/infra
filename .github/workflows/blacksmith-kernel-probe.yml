name: Blacksmith Kernel Probe

# Temporary diagnostic workflow: establishes whether Blacksmith's custom VM
# kernel can support the orchestrator/integration test requirements (nbd
# devices, KVM, tun, uffd, hugepages, swap). Delete once the verdict is in.
#
# Probe v1 findings: x64 has CONFIG_BLK_DEV_NBD=y (builtin, /dev/nbd0 exists,
# count unknown) + /dev/kvm + tun + uffd; arm64 has NO nbd at all and no
# /dev/kvm. So: x64 tests netlink-based nbd device creation; arm64 builds
# nbd.ko from source (KBUILD_MODPOST_WARN=1 for the missing Module.symvers).

on:
  pull_request:
    paths:
      - ".github/workflows/blacksmith-kernel-probe.yml"

permissions:
  contents: read

jobs:
  probe:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: blacksmith-8vcpu-ubuntu-2404
            arch: x64
          - runner: blacksmith-32vcpu-ubuntu-2404
            arch: x64
          - runner: blacksmith-4vcpu-ubuntu-2404-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Kernel and device diagnostics
        run: |
          set -x
          uname -a
          cat /proc/cmdline || true
          echo "--- nbd device inventory ---"
          ls /dev/nbd* 2>/dev/null | wc -l
          ls /dev/nbd* 2>/dev/null | sort -V | tail -3 || true
          echo "--- kernel config (incl. 'not set' lines) ---"
          zcat /proc/config.gz | grep -E '(MODVERSIONS|MODULE_SIG|MODULE_SIG_FORCE|MODULE_FORCE_LOAD|MODULE_COMPRESS|BLK_DEV_NBD|VSOCKETS|VHOST_VSOCK|SWAP|MEMORY_HOTPLUG)[ =]' || true
          echo "--- devices ---"
          ls -la /dev/kvm /dev/net/tun /dev/vhost-vsock 2>&1 || true
          echo "--- swap support ---"
          cat /proc/swaps || true
          echo "--- filesystem of / (fallocate swapfile support) ---"
          df -T / | tail -1

      - name: Swapfile smoke test (init-client.sh does swapon)
        continue-on-error: true
        run: |
          set -euxo pipefail
          sudo fallocate -l 512M /swapfile-probe
          sudo chmod 600 /swapfile-probe
          sudo mkswap /swapfile-probe
          sudo swapon /swapfile-probe
          cat /proc/swaps
          sudo swapoff /swapfile-probe
          echo "SWAP_OK"

      - name: "x64: netlink nbd device creation test"
        if: matrix.arch == 'x64'
        run: |
          set -euxo pipefail
          sudo apt-get update -qq && sudo apt-get install -y -qq nbd-server nbd-client
          # nbd-server package start may fail as a service; run manually
          dd if=/dev/zero of=/tmp/nbd-export.img bs=1M count=8
          cat > /tmp/nbd.conf <<'EOF'
          [generic]
            allowlist = false
          [probe]
            exportname = /tmp/nbd-export.img
          EOF
          sudo pkill nbd-server || true
          sudo nbd-server -C /tmp/nbd.conf
          sleep 1

          echo "--- devices before ---"; N_BEFORE=$(ls /dev/nbd* | wc -l)

          # Ask for an index that does not exist yet; netlink-capable
          # nbd-client makes the kernel create it on demand.
          sudo nbd-client -N probe 127.0.0.1 /dev/nbd200
          ls -la /dev/nbd200
          sudo nbd-client -d /dev/nbd200

          echo "--- bulk creation timing (50 devices) ---"
          T0=$(date +%s)
          for i in $(seq 300 349); do
            sudo nbd-client -N probe 127.0.0.1 "/dev/nbd$i" >/dev/null 2>&1
            sudo nbd-client -d "/dev/nbd$i" >/dev/null 2>&1
          done
          T1=$(date +%s)
          echo "50 devices in $((T1-T0))s"
          N_AFTER=$(ls /dev/nbd* | wc -l)
          echo "device count: $N_BEFORE -> $N_AFTER"
          [ -b /dev/nbd349 ]

      - name: "arm64: build nbd.ko from source and insmod"
        if: matrix.arch == 'arm64'
        run: |
          set -euxo pipefail
          T0=$(date +%s)
          KVER="$(uname -r)"
          BASE="${KVER%%-*}"
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential flex bison bc libssl-dev libelf-dev
          cd /tmp
          curl -fsSLO "https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-${BASE}.tar.xz"
          tar -xf "linux-${BASE}.tar.xz"
          cd "linux-${BASE}"
          zcat /proc/config.gz > .config
          ./scripts/config -m BLK_DEV_NBD
          ./scripts/config --disable MODULE_SIG_ALL || true
          ./scripts/config --set-str SYSTEM_TRUSTED_KEYS "" || true
          make olddefconfig
          grep -E '(MODVERSIONS|MODULE_SIG|BLK_DEV_NBD|LOCALVERSION)[ =]' .config || true
          make -j"$(nproc)" modules_prepare
          # No Module.symvers for the running kernel: modpost cannot resolve
          # core symbols and errors out; WARN=1 downgrades that. Runtime
          # symbol resolution happens in the kernel at insmod.
          make -j"$(nproc)" KBUILD_MODPOST_WARN=1 M=drivers/block modules
          modinfo -F vermagic drivers/block/nbd.ko
          echo "running kernel: $KVER"
          if ! sudo insmod drivers/block/nbd.ko nbds_max=256; then
            echo "insmod failed, dmesg:"
            sudo dmesg | tail -15
            exit 1
          fi
          T1=$(date +%s)
          echo "TOTAL arm nbd provisioning: $((T1-T0))s"
          ls /dev/nbd* | wc -l
          [ -b /dev/nbd0 ] && [ -b /dev/nbd255 ]
          # size the cacheable artifact
          ls -la drivers/block/nbd.ko

      - name: Verdict
        run: |
          set -x
          echo "=== VERDICT for ${{ matrix.runner }} ==="
          ls /dev/nbd* 2>/dev/null | wc -l
          [ -e /dev/kvm ] && echo KVM=yes || echo KVM=no
          sudo dmesg | grep -iE 'nbd|taint' | tail -5 || true
