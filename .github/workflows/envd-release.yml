name: Envd Release

# Consumes pending changesets from .changeset/ after they land on main:
# `changeset version` bumps packages/envd/package.json and updates
# packages/envd/CHANGELOG.md, the sync script copies the version into
# packages/envd/pkg/version.go, and the result is committed back to main.
# The release commit deletes the consumed changesets, so the re-triggered
# run is a no-op.

permissions:
  contents: read

# Serialize releases so concurrent merges don't race on the version bump.
concurrency:
  group: envd-release
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    paths:
      - '.changeset/**'

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.AUTOFIXER_APP_ID }}
          private-key: ${{ secrets.AUTOFIXER_APP_SECRET }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply pending changesets
        run: |
          npx changeset version
          ./scripts/sync-envd-version.sh

      - name: Commit and push the release
        run: |
          if [[ -z $(git status --porcelain) ]]; then
            echo "✅ No pending changesets, nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .changeset packages/envd

          if git diff --quiet HEAD -- packages/envd/package.json; then
            # Only empty changesets were consumed; no version bump.
            git commit -m "chore(envd): consume changesets"
          else
            version=$(jq -er .version packages/envd/package.json)
            git commit -m "chore(envd): release v$version"
          fi

          # Tolerate commits that landed on main while this job was running.
          git pull --rebase origin main
          git push origin HEAD:main

          echo "✅ Done."
