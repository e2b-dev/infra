name: Run tests on PRs

on: [ workflow_call ]

permissions:
  contents: read

jobs:
  run-tests:
    name: Run tests for ${{ matrix.package }}
    runs-on: infra-tests
    env:
      GIN_MODE: test
      # Disable Testcontainers' Ryuk reaper. Parallel test binaries from
      # `go test ./...` derive the same session-id-based reaper container
      # name and race on creation, causing flaky "container name already
      # in use" failures. Per-test t.Cleanup already terminates containers
      # on the normal exit path; the "Reap orphaned Testcontainers" step
      # below handles the abnormal-termination case (timeout / SIGKILL /
      # OOM) on the persistent self-hosted runner.
      TESTCONTAINERS_RYUK_DISABLED: "true"
    strategy:
      matrix:
        include:
          - package: packages/api
            test_path: ./...
            sudo: false
          - package: packages/client-proxy
            test_path: ./...
            sudo: false
          - package: packages/db
            test_path: ./...
            sudo: false
          - package: packages/docker-reverse-proxy
            test_path: ./...
            sudo: false
          - package: packages/envd
            test_path: ./...
            sudo: true
          - package: packages/orchestrator
            test_path: ./...
            sudo: true
          - package: packages/shared
            test_path: ./pkg/...
            sudo: false
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Go
        uses: ./.github/actions/go-setup-cache
        with:
          cache-dependency-paths: |
            go.work
            ${{ matrix.package }}/go.mod
            ${{ matrix.package }}/go.sum

      - name: Reap orphaned Testcontainers from previous runs
        # Self-hosted runner is persistent and Ryuk is disabled, so a
        # SIGKILL / timeout / OOM in a previous job can leave behind
        # postgres / redis / reaper containers. Force-remove anything
        # carrying a Testcontainers label or a reaper_ name substring
        # before tests start.
        #
        # Notes on the filters:
        # - Testcontainers labels every container it creates (user
        #   containers and the reaper itself) with
        #   `org.testcontainers=true`, so the label filter alone covers
        #   both. The `name=reaper_` query is a belt-and-braces fallback
        #   for any reaper container that somehow lost its label.
        # - `name=` is a substring match in Docker; do NOT anchor with
        #   `^reaper_` — the daemon's name-filter pre-check silently
        #   rejects anchored patterns (docker/cli#1201) and matches
        #   nothing.
        # - We run two separate `docker ps` calls and union the ids
        #   because mixing different filter keys in one call AND-s them.
        run: |
          set -euo pipefail
          ids=$(
            {
              docker ps -aq --filter "label=org.testcontainers=true"
              docker ps -aq --filter "name=reaper_"
            } | sort -u
          )
          if [ -n "${ids}" ]; then
            # shellcheck disable=SC2086
            docker rm -f ${ids}
          fi

      - name: Setup envd tests
        run: |
          # Install bindfs for FUSE mount tests
          sudo apt-get update && sudo apt-get install -y bindfs
        if: matrix.package == 'packages/envd'

      - name: Setup orchestrator tests
        run: |
          make -C packages/orchestrator fetch-busybox
          echo "HOST_BUSYBOX_DIR=$(pwd)/packages/orchestrator/.busybox" >> "$GITHUB_ENV"

          # Enable unprivileged uffd mode
          echo 1 | sudo tee /proc/sys/vm/unprivileged_userfaultfd

          # Enable hugepages
          sudo mkdir -p /mnt/hugepages
          sudo mount -t hugetlbfs none /mnt/hugepages
          echo 2000 | sudo tee /proc/sys/vm/nr_hugepages

          # Enable NBD
          sudo modprobe nbd nbds_max=256

          # Disable inotify watching of change events for NBD devices
          echo 'ACTION=="add|change", KERNEL=="nbd*", OPTIONS:="nowatch"' | sudo tee /etc/udev/rules.d/97-nbd-device.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger

        if: matrix.package == 'packages/orchestrator'

      - name: Run tests that require sudo
        working-directory: ${{ matrix.package }}
        run: |
          # Run tests. The '-E' flag is required to allow root to use the correct cache path.
          sudo -E `which go` test -v -timeout 20m ${{ matrix.test_path }}
        if: matrix.sudo == true

      - name: Run tests
        working-directory: ${{ matrix.package }}
        run: go test -v -timeout 20m ${{ matrix.test_path }}
        if: matrix.sudo == false

  validate-iac:
    name: Validate terraform
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Parse .tool-versions
        uses: wistia/parse-tool-versions@v2.1.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "${{ env.TERRAFORM }}"

      - name: Validate terraform
        working-directory: ./iac/provider-gcp
        run: |
          terraform init -backend=false
          terraform validate
