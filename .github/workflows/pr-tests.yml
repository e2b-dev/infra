name: Run tests on PRs

on:
  workflow_call:
    inputs:
      run-tests:
        type: boolean
        description: "Whether to run unit tests"
        required: false
        default: true
    secrets:
      CODECOV_TOKEN: { required: false }

permissions:
  contents: read

jobs:
  run-tests:
    name: Run unit test shards
    if: ${{ inputs.run-tests == true }}
    # All shards run on Blacksmith. The orchestrator shard needs the nbd
    # driver (built into the Blacksmith x64 kernel; see ensure-nbd action)
    # and /dev/kvm (present on Blacksmith x64 - verify the smoketest RUNS,
    # it skips silently when /dev/kvm is missing).
    runs-on: ${{ matrix.runner }}
    env:
      GIN_MODE: test
      # Parallel `go test ./...` binaries derive the same Ryuk session id
      # and race on `reaper_<hash>` creation. Disable Ryuk; t.Cleanup
      # handles normal exit, the prune step below handles abnormal exit.
      TESTCONTAINERS_RYUK_DISABLED: "true"
      # Surfaced as env so upload steps can gate on presence (skipped on fork PRs).
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      matrix:
        include:
          - package: packages/api
            flag: unit-api
            test_path: ./...
            sudo: false
            runner: blacksmith-4vcpu-ubuntu-2404
          - package: packages/client-proxy
            flag: unit-client-proxy
            test_path: ./...
            sudo: false
            runner: blacksmith-4vcpu-ubuntu-2404
          - package: packages/db
            flag: unit-db
            test_path: ./...
            sudo: false
            runner: blacksmith-4vcpu-ubuntu-2404
          - package: packages/docker-reverse-proxy
            flag: unit-docker-reverse-proxy
            test_path: ./...
            sudo: false
            runner: blacksmith-4vcpu-ubuntu-2404
          # envd mounts via bindfs (FUSE, no modprobe); this shard doubles as
          # the FUSE-on-Blacksmith canary — if it fails, pin it back to
          # infra-tests.
          - package: packages/envd
            flag: unit-envd
            test_path: ./...
            sudo: true
            runner: blacksmith-4vcpu-ubuntu-2404
          # 8vcpu: this shard boots Firecracker VMs (smoketest); it ran on a
          # 32-core infra-tests runner before - bump if the 20m timeout nears.
          - package: packages/orchestrator
            flag: unit-orchestrator
            test_path: ./...
            sudo: true
            runner: blacksmith-8vcpu-ubuntu-2404
          - package: packages/shared
            flag: unit-shared
            test_path: ./pkg/...
            sudo: false
            runner: blacksmith-4vcpu-ubuntu-2404
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Go
        uses: ./.github/actions/go-setup-cache
        with:
          cache-dependency-paths: |
            go.work
            ${{ matrix.package }}/go.mod
            ${{ matrix.package }}/go.sum

      - name: Reap orphaned Testcontainers from previous runs
        # Persistent runner + Ryuk disabled: prune leftover containers
        # from SIGKILL/timeout/OOM in prior jobs.
        # Two `docker ps` calls because different filter keys AND inside
        # one call. Don't anchor `name=^reaper_` — Docker silently drops
        # anchored patterns (docker/cli#1201).
        run: |
          set -euo pipefail
          ids=$(
            {
              docker ps -aq --filter "label=org.testcontainers=true"
              docker ps -aq --filter "name=reaper_"
            } | sort -u
          )
          if [ -n "${ids}" ]; then
            # shellcheck disable=SC2086
            docker rm -f ${ids}
          fi

      - name: Setup envd tests
        run: |
          # Install bindfs for FUSE mount tests
          sudo apt-get update && sudo apt-get install -y bindfs
        if: matrix.package == 'packages/envd'

      - name: Setup orchestrator tests
        run: |
          make -C packages/orchestrator fetch-busybox
          echo "HOST_BUSYBOX_DIR=$(pwd)/packages/orchestrator/.busybox" >> "$GITHUB_ENV"

          # Enable unprivileged uffd mode
          echo 1 | sudo tee /proc/sys/vm/unprivileged_userfaultfd

          # Enable hugepages
          sudo mkdir -p /mnt/hugepages
          sudo mount -t hugetlbfs none /mnt/hugepages
          echo 2000 | sudo tee /proc/sys/vm/nr_hugepages
        if: matrix.package == 'packages/orchestrator'

      - name: Ensure NBD devices
        uses: ./.github/actions/ensure-nbd
        with:
          nbds-max: "256"
        if: matrix.package == 'packages/orchestrator'

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      # sudo strips PATH; pass it through so gotestsum/go resolve to the runner's
      # toolchain (1.26.5) instead of /usr/bin/go. Trap chowns reports back to
      # the runner so uploads can read them even when tests fail.
      - name: Run tests that require sudo
        working-directory: ${{ matrix.package }}
        run: |
          trap 'sudo chown "$(id -u):$(id -g)" coverage.txt junit.xml 2>/dev/null || true' EXIT
          sudo -E env "PATH=$PATH" gotestsum --junitfile=junit.xml --format=standard-verbose \
            -- -timeout 20m -coverprofile=coverage.txt -covermode=atomic ${{ matrix.test_path }}
        if: matrix.sudo == true

      - name: Run tests
        working-directory: ${{ matrix.package }}
        run: |
          gotestsum --junitfile=junit.xml --format=standard-verbose \
            -- -timeout 20m -coverprofile=coverage.txt -covermode=atomic ${{ matrix.test_path }}
        if: matrix.sudo == false

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() && env.CODECOV_TOKEN != '' &&
          hashFiles(format('{0}/coverage.txt', matrix.package)) != '' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ matrix.package }}/coverage.txt
          flags: ${{ matrix.flag }},unit
          disable_search: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && env.CODECOV_TOKEN != '' &&
          hashFiles(format('{0}/junit.xml', matrix.package)) != '' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ matrix.package }}/junit.xml
          flags: ${{ matrix.flag }},unit
          disable_search: true
          report_type: test_results

  unit_tests:
    needs: run-tests
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Aggregate unit test result
        run: |
          if [[ "${{ inputs.run-tests }}" != "true" ]]; then
            echo "unit tests skipped because test inputs did not change"
            exit 0
          fi

          if [[ "${{ needs.run-tests.result }}" != "success" ]]; then
            echo "unit tests result: ${{ needs.run-tests.result }}"
            exit 1
          fi

          echo "all unit test shards succeeded"
