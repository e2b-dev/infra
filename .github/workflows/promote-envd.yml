name: Promote envd

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA suffix to promote
        required: true
        type: string
      staging:
        description: Promote to staging
        required: false
        type: boolean
        default: false
      foxtrot:
        description: Promote to foxtrot
        required: false
        type: boolean
        default: false
      juliett:
        description: Promote to juliett
        required: false
        type: boolean
        default: false
      tango:
        description: Promote to tango
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  validate-inputs:
    name: Validate inputs
    runs-on: ubuntu-24.04
    outputs:
      environments: ${{ steps.environments.outputs.environments }}
    steps:
      - name: Validate commit SHA
        env:
          ENVD_COMMIT_SHA: ${{ inputs.commit_sha }}
        run: |
          if [[ ! "$ENVD_COMMIT_SHA" =~ ^[0-9a-f]{7,40}$ ]]; then
            echo "commit_sha must be a lowercase hexadecimal Git SHA suffix."
            exit 1
          fi

      - name: Require an environment
        if: ${{ inputs.staging != true && inputs.foxtrot != true && inputs.juliett != true && inputs.tango != true }}
        run: |
          echo "Select at least one environment to promote envd."
          exit 1

      - name: Build environment matrix
        id: environments
        env:
          STAGING: ${{ inputs.staging }}
          FOXTROT: ${{ inputs.foxtrot }}
          JULIETT: ${{ inputs.juliett }}
          TANGO: ${{ inputs.tango }}
        run: |
          envs=()
          [[ "$STAGING" == "true" ]] && envs+=("staging")
          [[ "$FOXTROT" == "true" ]] && envs+=("foxtrot")
          [[ "$JULIETT" == "true" ]] && envs+=("juliett")
          [[ "$TANGO" == "true" ]] && envs+=("tango")

          json="$(printf '%s\n' "${envs[@]}" | jq -R . | jq -cs .)"
          echo "environments=${json}" >> "$GITHUB_OUTPUT"

  promote:
    name: Promote envd to ${{ matrix.environment }}
    needs: validate-inputs
    runs-on: ci-builder
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJSON(needs.validate-inputs.outputs.environments) }}
    environment: ${{ matrix.environment }}
    concurrency:
      group: promote-envd-${{ matrix.environment }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Promote envd
        uses: ./.github/actions/promote-envd
        with:
          environment: ${{ matrix.environment }}
          commit_sha: ${{ inputs.commit_sha }}
          infisical_machine_identity_id: ${{ vars.INFISICAL_MACHINE_IDENTITY_ID }}
