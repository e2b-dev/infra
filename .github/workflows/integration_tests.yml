name: Integration Tests

on:
  workflow_call:
    inputs:
      publish:
        type: boolean
        description: "Whether to publish the results"
        required: true
      run-tests:
        type: boolean
        description: "Whether to run integration tests"
        required: false
        default: true
      full-matrix:
        type: boolean
        description: "Run all compression configs. When false, only the production-like zstd1 config runs (used on PRs to save ~2/3 of runner time; the full matrix still runs on main)."
        required: false
        default: true
    secrets:
      CODECOV_TOKEN: { required: false }
jobs:
  run:
    if: ${{ inputs.run-tests == true }}
    runs-on: infra-tests
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        # The full 3-config matrix (uncompressed/zstd1/lz4) runs on push to
        # main. PRs run only zstd1 (the production-like config) since most
        # tests don't depend on compression/dedup/memfd settings, and each
        # shard repeats the whole build+services+suite pipeline (~20 min).
        include: >-
          ${{ fromJSON(inputs.full-matrix
            && '[
                  {"name": "uncompressed", "compress_enabled": "false", "compress_type": "", "compress_level": "", "compress_workers": "", "dedup_mode": "default", "disable_memfd": "true"},
                  {"name": "zstd1", "compress_enabled": "true", "compress_type": "zstd", "compress_level": "1", "compress_workers": "8", "dedup_mode": "best_effort", "disable_memfd": "false"},
                  {"name": "lz4", "compress_enabled": "true", "compress_type": "lz4", "compress_level": "0", "compress_workers": "8", "dedup_mode": "direct_io", "disable_memfd": "false"}
                ]'
            || '[
                  {"name": "zstd1", "compress_enabled": "true", "compress_type": "zstd", "compress_level": "1", "compress_workers": "8", "dedup_mode": "best_effort", "disable_memfd": "false"}
                ]') }}
    env:
      # Surfaced as env so upload steps can gate on presence (skipped on fork PRs).
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      # Build race-instrumented but optimized binaries: nobody attaches a
      # debugger in CI, and -N -l slows both compilation and every test at
      # runtime. Set at the job level so the build-packages step and the
      # rebuilds inside the run/run-debug targets use identical flags (the
      # second build is then a Go build cache no-op).
      DEBUG_GCFLAGS: ""

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Build Packages
        uses: ./.github/actions/build-packages

      - name: Initialize Host
        uses: ./.github/actions/host-init

      - name: Build Template
        uses: ./.github/actions/build-sandbox-template
        with:
          compress_enabled: ${{ matrix.compress_enabled }}
          compress_type: ${{ matrix.compress_type }}
          compress_level: ${{ matrix.compress_level }}
          compress_workers: ${{ matrix.compress_workers }}

      - name: Start Services
        uses: ./.github/actions/start-services
        with:
          compress_enabled: ${{ matrix.compress_enabled }}
          compress_type: ${{ matrix.compress_type }}
          compress_level: ${{ matrix.compress_level }}
          compress_workers: ${{ matrix.compress_workers }}
          dedup_mode: ${{ matrix.dedup_mode }}
          disable_memfd: ${{ matrix.disable_memfd }}

      - name: Run Integration Tests
        env:
          TESTS_API_SERVER_URL: "http://localhost:3000"
          TESTS_API_INTERNAL_GRPC_ADDRESS: "localhost:5009"
          TESTS_ORCHESTRATOR_HOST: "localhost:5008"
          TESTS_ENVD_PROXY: "http://localhost:3002"
          TESTS_CLIENT_PROXY: "http://localhost:3002"
          # Nearly all tests are t.Parallel() and gated by a 100-slot sandbox
          # semaphore in the harness; the go test default of -parallel=4 was
          # the throughput bottleneck (e.g. api/sandboxes is ~1250s of test
          # time squeezed through 4 slots). Tune down if flakiness increases.
          TEST_PARALLELISM: "12"
        run: |
          # Run the integration tests
          make test-integration

      - name: Check for Data Races in Service Logs
        if: always()
        run: |
          echo "Checking service logs for data races..."
          RACE_FOUND=0

          for log_file in ~/logs/*.log; do
            if [ -f "$log_file" ]; then
              if grep -q "WARNING: DATA RACE" "$log_file"; then
                echo "::error::Data race detected in $(basename "$log_file")"
                echo "=========================================="
                echo "DATA RACES IN: $log_file"
                echo "=========================================="
                # Extract and print all data race blocks
                grep -A 30 "WARNING: DATA RACE" "$log_file" | head -200
                echo ""
                RACE_FOUND=1
              fi
            fi
          done

          if [ "$RACE_FOUND" -eq 1 ]; then
            echo "::error::Data races were detected in service logs. See above for details."
            exit 1
          else
            echo "No data races detected in service logs."
          fi
        shell: bash

      - name: Upload Test Results
        if: ${{ always() && inputs.publish == true }}
        uses: actions/upload-artifact@v6
        with:
          name: Integration Tests Results (${{ matrix.name }})
          path: ./tests/integration/test-results.xml

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && env.CODECOV_TOKEN != '' && hashFiles('tests/integration/test-results.xml') != '' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: tests/integration/test-results.xml
          flags: integration
          disable_search: true
          report_type: test_results

      - name: Upload Service Logs
        if: ${{ always() && inputs.publish == true }}
        uses: actions/upload-artifact@v6
        with:
          name: Service Logs (${{ matrix.name }})
          path: ~/logs/*.log

  integration_tests:
    needs: run
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Aggregate matrix result
        run: |
          if [[ "${{ inputs.run-tests }}" != "true" ]]; then
            echo "integration tests skipped because test inputs did not change"
            exit 0
          fi

          if [[ "${{ needs.run.result }}" != "success" ]]; then
            echo "matrix result: ${{ needs.run.result }}"
            exit 1
          fi
          echo "all matrix shards succeeded"
